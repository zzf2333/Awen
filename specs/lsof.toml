[command]
name = "lsof"
description = "List open files"

[[command.flags]]
name = "-i"
arg = "SPEC"
description = "Select network files"

[[command.flags]]
name = "-p"
arg = "PID"
description = "Select by process ID"

[[command.flags]]
name = "-t"
description = "Terse output, PIDs only"

[[command.flags]]
name = "-c"
arg = "NAME"
description = "Select by command name"

[[command.flags]]
name = "-u"
arg = "USER"
description = "Select by user"

[[command.flags]]
name = "-n"
description = "No DNS name resolution"

[[command.flags]]
name = "-P"
description = "No port name resolution"

[[command.flags]]
name = "+D"
arg = "DIR"
description = "Search directory recursively"
