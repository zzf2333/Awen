[command]
name = "php"
description = "PHP interpreter"

[[command.flags]]
name = "-r"
arg = "CODE"
description = "Run inline code"

[[command.flags]]
name = "-S"
arg = "ADDR:PORT"
description = "Start built-in web server"

[[command.flags]]
name = "-t"
arg = "DIR"
description = "Document root for built-in server"

[[command.flags]]
name = "-c"
arg = "FILE"
description = "PHP config file"

[[command.flags]]
name = "-d"
arg = "KEY=VALUE"
description = "Set php.ini value"

[[command.flags]]
name = "-l"
description = "Syntax check only"

[[command.flags]]
name = "-a"
description = "Interactive mode"

[[command.flags]]
name = "-m"
description = "Show compiled modules"

[[command.flags]]
name = "-i"
description = "Show phpinfo()"

[[command.flags]]
name = "-v"
description = "Show version"
