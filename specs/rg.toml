[command]
name = "rg"
description = "Fast recursive search tool (ripgrep)"

[[command.flags]]
name = "--ignore-case"
short = "-i"
description = "Case-insensitive search"

[[command.flags]]
name = "--word-regexp"
short = "-w"
description = "Match whole words only"

[[command.flags]]
name = "--files-with-matches"
short = "-l"
description = "Print only filenames"

[[command.flags]]
name = "--count"
short = "-c"
description = "Show match count per file"

[[command.flags]]
name = "--line-number"
short = "-n"
description = "Show line numbers"

[[command.flags]]
name = "--no-line-number"
short = "-N"
description = "Suppress line numbers"

[[command.flags]]
name = "--type"
short = "-t"
arg = "TYPE"
description = "Only search files of TYPE"

[[command.flags]]
name = "--glob"
short = "-g"
arg = "GLOB"
description = "Include or exclude files"

[[command.flags]]
name = "--hidden"
description = "Search hidden files"

[[command.flags]]
name = "--no-ignore"
description = "Don't respect ignore files"

[[command.flags]]
name = "--multiline"
short = "-U"
description = "Enable multiline matching"

[[command.flags]]
name = "--fixed-strings"
short = "-F"
description = "Treat pattern as literal string"

[[command.flags]]
name = "--regexp"
short = "-e"
arg = "PATTERN"
description = "Pattern to search for"

[[command.flags]]
name = "--replace"
short = "-r"
arg = "TEXT"
description = "Replace matches with TEXT"

[[command.flags]]
name = "--max-depth"
arg = "N"
description = "Maximum directory depth"

[[command.flags]]
name = "--context"
short = "-C"
arg = "N"
description = "Show N lines of context"

[[command.flags]]
name = "--after-context"
short = "-A"
arg = "N"
description = "Show N lines after match"

[[command.flags]]
name = "--before-context"
short = "-B"
arg = "N"
description = "Show N lines before match"

[[command.flags]]
name = "--invert-match"
short = "-v"
description = "Show non-matching lines"

[[command.flags]]
name = "--json"
description = "Output results as JSON"

[[command.flags]]
name = "--stats"
description = "Print search statistics"
