[command]
name = "pytest"
description = "Python testing framework"

[[command.flags]]
name = "--verbose"
short = "-v"
description = "Increase verbosity"
[[command.flags]]
name = "--quiet"
short = "-q"
description = "Decrease verbosity"
[[command.flags]]
name = "--exitfirst"
short = "-x"
description = "Stop on first failure"
[[command.flags]]
name = "-s"
description = "Disable stdout/stderr capture"
[[command.flags]]
name = "-k"
arg = "EXPR"
description = "Filter tests by keyword expression"
[[command.flags]]
name = "-m"
arg = "MARKER"
description = "Filter tests by marker expression"
[[command.flags]]
name = "--tb"
arg = "STYLE"
description = "Traceback style (short, long, line, no, auto)"
[[command.flags]]
name = "--cov"
arg = "SOURCE"
description = "Measure coverage for source"
[[command.flags]]
name = "--cov-report"
arg = "TYPE"
description = "Coverage report type (term, html, xml)"
[[command.flags]]
name = "-n"
arg = "NUM"
description = "Parallel workers (pytest-xdist)"
[[command.flags]]
name = "--last-failed"
short = "--lf"
description = "Re-run only tests that failed last time"
[[command.flags]]
name = "--failed-first"
short = "--ff"
description = "Run failed tests first then the rest"
[[command.flags]]
name = "--maxfail"
arg = "NUM"
description = "Stop after N failures"
[[command.flags]]
name = "--durations"
arg = "NUM"
description = "Show N slowest test durations"
[[command.flags]]
name = "-p"
arg = "PLUGIN"
description = "Load or disable a plugin"
[[command.flags]]
name = "--pdb"
description = "Drop into debugger on failure"
[[command.flags]]
name = "--collect-only"
short = "--co"
description = "Only collect tests without running"
[[command.flags]]
name = "--fixtures"
description = "Show available fixtures"
[[command.flags]]
name = "--markers"
description = "Show available markers"
[[command.flags]]
name = "--no-header"
description = "Disable header in output"
[[command.flags]]
name = "--strict-markers"
description = "Error on unknown markers"
[[command.flags]]
name = "--rootdir"
arg = "DIR"
description = "Root directory for test discovery"
[[command.flags]]
name = "--override-ini"
arg = "SETTING"
description = "Override ini configuration value"
[[command.flags]]
name = "--import-mode"
arg = "MODE"
description = "Import mode (prepend, append, importlib)"
