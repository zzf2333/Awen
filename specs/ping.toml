[command]
name = "ping"
description = "Send ICMP echo requests"

[[command.flags]]
name = "-c"
arg = "COUNT"
description = "Stop after count packets"

[[command.flags]]
name = "-i"
arg = "SECONDS"
description = "Interval between packets"

[[command.flags]]
name = "-t"
arg = "TTL"
description = "Time to live"

[[command.flags]]
name = "-s"
arg = "SIZE"
description = "Packet size in bytes"

[[command.flags]]
name = "-W"
arg = "SECONDS"
description = "Timeout for each reply"

[[command.flags]]
name = "-q"
description = "Quiet output"

[[command.flags]]
name = "-f"
description = "Flood ping"

[[command.flags]]
name = "-4"
description = "IPv4 only"

[[command.flags]]
name = "-6"
description = "IPv6 only"
