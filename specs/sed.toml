[command]
name = "sed"
description = "Stream editor for text"

[[command.flags]]
name = "-i"
arg = "SUFFIX"
description = "Edit files in place"

[[command.flags]]
name = "-n"
description = "Suppress automatic printing"

[[command.flags]]
name = "-e"
arg = "SCRIPT"
description = "Add editing command"

[[command.flags]]
name = "-E"
description = "Use extended regex"

[[command.flags]]
name = "-f"
arg = "FILE"
description = "Read commands from file"
