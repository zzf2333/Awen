[command]
name = "tmux"
description = "Terminal multiplexer"

[[command.subcommands]]
name = "new-session"
description = "Create a new session"
[[command.subcommands.flags]]
name = "-s"
arg = "NAME"
description = "Session name"
[[command.subcommands.flags]]
name = "-d"
description = "Start detached"
[[command.subcommands.flags]]
name = "-n"
arg = "NAME"
description = "Window name"

[[command.subcommands]]
name = "attach-session"
description = "Attach to a session"
[[command.subcommands.flags]]
name = "-t"
arg = "TARGET"
description = "Target session"
[[command.subcommands.flags]]
name = "-d"
description = "Detach other clients"

[[command.subcommands]]
name = "list-sessions"
description = "List sessions"

[[command.subcommands]]
name = "kill-session"
description = "Kill a session"
[[command.subcommands.flags]]
name = "-t"
arg = "TARGET"
description = "Target session"
[[command.subcommands.flags]]
name = "-a"
description = "Kill all but target"

[[command.subcommands]]
name = "split-window"
description = "Split current pane"
[[command.subcommands.flags]]
name = "-h"
description = "Horizontal split"
[[command.subcommands.flags]]
name = "-v"
description = "Vertical split"
[[command.subcommands.flags]]
name = "-p"
arg = "PERCENT"
description = "Pane size percentage"

[[command.subcommands]]
name = "select-pane"
description = "Select a pane"
[[command.subcommands.flags]]
name = "-t"
arg = "TARGET"
description = "Target pane"
[[command.subcommands.flags]]
name = "-U"
description = "Select pane above"
[[command.subcommands.flags]]
name = "-D"
description = "Select pane below"
[[command.subcommands.flags]]
name = "-L"
description = "Select pane left"
[[command.subcommands.flags]]
name = "-R"
description = "Select pane right"

[[command.subcommands]]
name = "new-window"
description = "Create a new window"
[[command.subcommands.flags]]
name = "-n"
arg = "NAME"
description = "Window name"
[[command.subcommands.flags]]
name = "-t"
arg = "TARGET"
description = "Target window"

[[command.subcommands]]
name = "send-keys"
description = "Send keys to a pane"
[[command.subcommands.flags]]
name = "-t"
arg = "TARGET"
description = "Target pane"

[[command.subcommands]]
name = "kill-server"
description = "Kill the tmux server"

[[command.subcommands]]
name = "source-file"
description = "Load config file"
