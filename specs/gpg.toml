[command]
name = "gpg"
description = "GNU Privacy Guard encryption tool"

[[command.flags]]
name = "--encrypt"
short = "-e"
description = "Encrypt data"

[[command.flags]]
name = "--decrypt"
short = "-d"
description = "Decrypt data"

[[command.flags]]
name = "--sign"
short = "-s"
description = "Sign data"

[[command.flags]]
name = "--verify"
description = "Verify signature"

[[command.flags]]
name = "--import"
description = "Import keys"

[[command.flags]]
name = "--export"
description = "Export keys"

[[command.flags]]
name = "--list-keys"
short = "-k"
description = "List public keys"

[[command.flags]]
name = "--list-secret-keys"
short = "-K"
description = "List secret keys"

[[command.flags]]
name = "--gen-key"
description = "Generate a new key pair"

[[command.flags]]
name = "--full-generate-key"
description = "Full key generation dialog"

[[command.flags]]
name = "--recipient"
short = "-r"
arg = "NAME"
description = "Encrypt for recipient"

[[command.flags]]
name = "--armor"
short = "-a"
description = "ASCII armored output"

[[command.flags]]
name = "--output"
short = "-o"
arg = "FILE"
description = "Write output to file"

[[command.flags]]
name = "--detach-sign"
short = "-b"
description = "Create detached signature"

[[command.flags]]
name = "--keyserver"
arg = "URL"
description = "Use keyserver"

[[command.flags]]
name = "--delete-key"
description = "Delete a public key"

[[command.flags]]
name = "--fingerprint"
description = "Show key fingerprints"
