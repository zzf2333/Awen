[command]
name = "awk"
description = "Pattern scanning and processing"

[[command.flags]]
name = "-F"
arg = "SEP"
description = "Set field separator"

[[command.flags]]
name = "-v"
arg = "VAR=VAL"
description = "Assign variable before program"

[[command.flags]]
name = "-f"
arg = "FILE"
description = "Read program from file"
