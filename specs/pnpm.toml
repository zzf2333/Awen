[command]
name = "pnpm"
description = "Fast, disk space efficient package manager"

[[command.flags]]
name = "--recursive"
short = "-r"
description = "Run in every project of the workspace"
[[command.flags]]
name = "--filter"
arg = "PATTERN"
description = "Filter packages by name or directory"
[[command.flags]]
name = "--workspace-root"
short = "-w"
description = "Run as if in workspace root"
[[command.flags]]
name = "--dir"
short = "-C"
arg = "DIR"
description = "Change to directory before running"

[[command.subcommands]]
name = "install"
description = "Install all dependencies"
[[command.subcommands.flags]]
name = "--frozen-lockfile"
description = "Fail if lockfile is outdated"
[[command.subcommands.flags]]
name = "--no-frozen-lockfile"
description = "Do not fail if lockfile is outdated"
[[command.subcommands.flags]]
name = "--prod"
short = "-P"
description = "Install production dependencies only"
[[command.subcommands.flags]]
name = "--dev"
short = "-D"
description = "Install dev dependencies only"
[[command.subcommands.flags]]
name = "--no-optional"
description = "Skip optional dependencies"
[[command.subcommands.flags]]
name = "--prefer-offline"
description = "Prefer cached packages"

[[command.subcommands]]
name = "add"
description = "Add a package"
[[command.subcommands.flags]]
name = "--save-dev"
short = "-D"
description = "Save as dev dependency"
[[command.subcommands.flags]]
name = "--save-exact"
short = "-E"
description = "Save exact version"
[[command.subcommands.flags]]
name = "--save-peer"
description = "Save as peer dependency"
[[command.subcommands.flags]]
name = "--global"
short = "-g"
description = "Install globally"

[[command.subcommands]]
name = "remove"
description = "Remove a package"
[[command.subcommands.flags]]
name = "--global"
short = "-g"
description = "Remove globally installed package"

[[command.subcommands]]
name = "update"
description = "Update packages"
[[command.subcommands.flags]]
name = "--latest"
short = "-L"
description = "Update to latest regardless of range"
[[command.subcommands.flags]]
name = "--global"
short = "-g"
description = "Update global packages"
[[command.subcommands.flags]]
name = "--interactive"
short = "-i"
description = "Choose which packages to update"

[[command.subcommands]]
name = "run"
description = "Run a script defined in package.json"
[[command.subcommands.flags]]
name = "--recursive"
short = "-r"
description = "Run in every workspace package"
[[command.subcommands.flags]]
name = "--if-present"
description = "Skip if script is not defined"

[[command.subcommands]]
name = "exec"
description = "Execute a shell command in scope of a project"

[[command.subcommands]]
name = "dlx"
description = "Fetch and run a package without installing"
[[command.subcommands.flags]]
name = "--package"
short = "-p"
arg = "PKG"
description = "Package to install for the command"

[[command.subcommands]]
name = "store"
description = "Manage the content-addressable store"
[[command.subcommands.subcommands]]
name = "status"
description = "Check modified packages in store"
[[command.subcommands.subcommands]]
name = "prune"
description = "Remove unreferenced packages from store"
[[command.subcommands.subcommands]]
name = "path"
description = "Print the store directory path"

[[command.subcommands]]
name = "outdated"
description = "Check for outdated packages"

[[command.subcommands]]
name = "list"
description = "List installed packages"

[[command.subcommands]]
name = "audit"
description = "Check for known vulnerabilities"

[[command.subcommands]]
name = "init"
description = "Create a package.json"

[[command.subcommands]]
name = "test"
description = "Run the test script"

[[command.subcommands]]
name = "build"
description = "Run the build script"

[[command.subcommands]]
name = "dev"
description = "Run the dev script"

[[command.subcommands]]
name = "start"
description = "Run the start script"

[[command.subcommands]]
name = "link"
description = "Symlink a package to the current project"

[[command.subcommands]]
name = "unlink"
description = "Unlink a symlinked package"

[[command.subcommands]]
name = "publish"
description = "Publish a package to the registry"

[[command.subcommands]]
name = "pack"
description = "Create a tarball from a package"
