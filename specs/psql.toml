[command]
name = "psql"
description = "PostgreSQL interactive terminal"

[[command.flags]]
name = "-h"
arg = "HOST"
description = "Database server host"

[[command.flags]]
name = "-p"
arg = "PORT"
description = "Database server port"

[[command.flags]]
name = "-U"
arg = "USER"
description = "Database user name"

[[command.flags]]
name = "-d"
arg = "DBNAME"
description = "Database name"

[[command.flags]]
name = "-c"
arg = "COMMAND"
description = "Run a single command"

[[command.flags]]
name = "-f"
arg = "FILE"
description = "Execute commands from file"

[[command.flags]]
name = "-l"
description = "List available databases"

[[command.flags]]
name = "-t"
description = "Tuples only (no headers)"

[[command.flags]]
name = "-A"
description = "Unaligned output mode"

[[command.flags]]
name = "-F"
arg = "SEP"
description = "Field separator"

[[command.flags]]
name = "-w"
description = "Never prompt for password"

[[command.flags]]
name = "-W"
description = "Force password prompt"
