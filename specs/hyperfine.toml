[command]
name = "hyperfine"
description = "Command-line benchmarking tool"

[[command.flags]]
name = "--warmup"
short = "-w"
arg = "N"
description = "Warmup runs before benchmark"

[[command.flags]]
name = "--min-runs"
short = "-m"
arg = "N"
description = "Minimum number of runs"

[[command.flags]]
name = "--max-runs"
short = "-M"
arg = "N"
description = "Maximum number of runs"

[[command.flags]]
name = "--prepare"
short = "-p"
arg = "CMD"
description = "Command to run before each benchmark"

[[command.flags]]
name = "--cleanup"
short = "-c"
arg = "CMD"
description = "Command to run after each benchmark"

[[command.flags]]
name = "--export-json"
arg = "FILE"
description = "Export results as JSON"

[[command.flags]]
name = "--export-markdown"
arg = "FILE"
description = "Export results as Markdown table"

[[command.flags]]
name = "--shell"
short = "-S"
arg = "SHELL"
description = "Shell to use for commands"

[[command.flags]]
name = "--ignore-failure"
short = "-i"
description = "Ignore non-zero exit codes"

[[command.flags]]
name = "--show-output"
description = "Show command output"

[[command.flags]]
name = "--runs"
short = "-r"
arg = "N"
description = "Exact number of runs"

[[command.flags]]
name = "--style"
arg = "TYPE"
description = "Output style (full, basic, nocolor, color, none)"

[[command.flags]]
name = "--parameter-scan"
short = "-P"
arg = "VAR MIN MAX"
description = "Parametric benchmark scan"
