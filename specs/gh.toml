[command]
name = "gh"
description = "GitHub CLI"

[[command.subcommands]]
name = "pr"
description = "Manage pull requests"
[[command.subcommands.subcommands]]
name = "create"
description = "Create a pull request"
[[command.subcommands.subcommands.flags]]
name = "--title"
short = "-t"
arg = "TITLE"
description = "PR title"
[[command.subcommands.subcommands.flags]]
name = "--body"
short = "-b"
arg = "BODY"
description = "PR body"
[[command.subcommands.subcommands.flags]]
name = "--draft"
short = "-d"
description = "Create as draft"
[[command.subcommands.subcommands.flags]]
name = "--base"
arg = "BASE"
description = "Base branch"
[[command.subcommands.subcommands]]
name = "list"
description = "List pull requests"
[[command.subcommands.subcommands.flags]]
name = "--state"
arg = "STATE"
description = "Filter by state"
[[command.subcommands.subcommands.flags]]
name = "--limit"
short = "-L"
arg = "NUM"
description = "Max number of PRs"
[[command.subcommands.subcommands]]
name = "checkout"
description = "Check out a pull request"
[[command.subcommands.subcommands.flags]]
name = "--branch"
short = "-b"
arg = "BRANCH"
description = "Local branch name"
[[command.subcommands.subcommands]]
name = "merge"
description = "Merge a pull request"
[[command.subcommands.subcommands.flags]]
name = "--merge"
short = "-m"
description = "Merge commit"
[[command.subcommands.subcommands.flags]]
name = "--squash"
short = "-s"
description = "Squash and merge"
[[command.subcommands.subcommands.flags]]
name = "--rebase"
short = "-r"
description = "Rebase and merge"
[[command.subcommands.subcommands.flags]]
name = "--delete-branch"
short = "-d"
description = "Delete branch after merge"
[[command.subcommands.subcommands]]
name = "view"
description = "View a pull request"
[[command.subcommands.subcommands.flags]]
name = "--web"
short = "-w"
description = "Open in browser"
[[command.subcommands.subcommands]]
name = "diff"
description = "View PR diff"
[[command.subcommands.subcommands]]
name = "close"
description = "Close a pull request"
[[command.subcommands.subcommands]]
name = "reopen"
description = "Reopen a pull request"

[[command.subcommands]]
name = "issue"
description = "Manage issues"
[[command.subcommands.subcommands]]
name = "create"
description = "Create an issue"
[[command.subcommands.subcommands.flags]]
name = "--title"
short = "-t"
arg = "TITLE"
description = "Issue title"
[[command.subcommands.subcommands.flags]]
name = "--body"
short = "-b"
arg = "BODY"
description = "Issue body"
[[command.subcommands.subcommands.flags]]
name = "--label"
short = "-l"
arg = "LABEL"
description = "Add label"
[[command.subcommands.subcommands]]
name = "list"
description = "List issues"
[[command.subcommands.subcommands.flags]]
name = "--state"
arg = "STATE"
description = "Filter by state"
[[command.subcommands.subcommands.flags]]
name = "--label"
short = "-l"
arg = "LABEL"
description = "Filter by label"
[[command.subcommands.subcommands.flags]]
name = "--limit"
short = "-L"
arg = "NUM"
description = "Max number of issues"
[[command.subcommands.subcommands]]
name = "view"
description = "View an issue"
[[command.subcommands.subcommands.flags]]
name = "--web"
short = "-w"
description = "Open in browser"
[[command.subcommands.subcommands]]
name = "close"
description = "Close an issue"
[[command.subcommands.subcommands]]
name = "reopen"
description = "Reopen an issue"

[[command.subcommands]]
name = "repo"
description = "Manage repositories"
[[command.subcommands.subcommands]]
name = "clone"
description = "Clone a repository"
[[command.subcommands.subcommands]]
name = "create"
description = "Create a repository"
[[command.subcommands.subcommands.flags]]
name = "--public"
description = "Make public"
[[command.subcommands.subcommands.flags]]
name = "--private"
description = "Make private"
[[command.subcommands.subcommands.flags]]
name = "--description"
short = "-d"
arg = "DESC"
description = "Repository description"
[[command.subcommands.subcommands]]
name = "view"
description = "View a repository"
[[command.subcommands.subcommands.flags]]
name = "--web"
short = "-w"
description = "Open in browser"
[[command.subcommands.subcommands]]
name = "fork"
description = "Fork a repository"

[[command.subcommands]]
name = "run"
description = "Manage workflow runs"
[[command.subcommands.subcommands]]
name = "list"
description = "List workflow runs"
[[command.subcommands.subcommands]]
name = "view"
description = "View a workflow run"
[[command.subcommands.subcommands.flags]]
name = "--web"
short = "-w"
description = "Open in browser"
[[command.subcommands.subcommands]]
name = "watch"
description = "Watch a workflow run"
[[command.subcommands.subcommands]]
name = "rerun"
description = "Rerun a workflow run"

[[command.subcommands]]
name = "auth"
description = "Manage authentication"
[[command.subcommands.subcommands]]
name = "login"
description = "Log in to GitHub"
[[command.subcommands.subcommands]]
name = "logout"
description = "Log out of GitHub"
[[command.subcommands.subcommands]]
name = "status"
description = "Show auth status"
