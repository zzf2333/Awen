[command]
name = "fd"
description = "Fast and user-friendly find alternative"

[[command.flags]]
name = "--type"
short = "-t"
arg = "TYPE"
description = "Filter by type (f, d, l, x, e, s, p)"

[[command.flags]]
name = "--extension"
short = "-e"
arg = "EXT"
description = "Filter by file extension"

[[command.flags]]
name = "--exec"
short = "-x"
arg = "CMD"
description = "Execute command for each result"

[[command.flags]]
name = "--exec-batch"
short = "-X"
arg = "CMD"
description = "Execute command with all results"

[[command.flags]]
name = "--hidden"
short = "-H"
description = "Search hidden files"

[[command.flags]]
name = "--no-ignore"
short = "-I"
description = "Don't respect ignore files"

[[command.flags]]
name = "--glob"
short = "-g"
description = "Glob-based search"

[[command.flags]]
name = "--max-depth"
short = "-d"
arg = "N"
description = "Maximum search depth"

[[command.flags]]
name = "--exclude"
short = "-E"
arg = "PATTERN"
description = "Exclude entries matching pattern"

[[command.flags]]
name = "--full-path"
short = "-p"
description = "Match against full path"

[[command.flags]]
name = "--absolute-path"
short = "-a"
description = "Show absolute paths"

[[command.flags]]
name = "--list-details"
short = "-l"
description = "Show file details (like ls -l)"

[[command.flags]]
name = "--size"
short = "-S"
arg = "SIZE"
description = "Filter by file size"

[[command.flags]]
name = "--changed-within"
arg = "DATE"
description = "Filter by modification time"

[[command.flags]]
name = "--color"
short = "-c"
arg = "WHEN"
description = "When to use colors"
