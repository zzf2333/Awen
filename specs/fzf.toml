[command]
name = "fzf"
description = "Command-line fuzzy finder"

[[command.flags]]
name = "--multi"
short = "-m"
description = "Enable multi-select"

[[command.flags]]
name = "--preview"
arg = "COMMAND"
description = "Preview command"

[[command.flags]]
name = "--bind"
arg = "KEYBINDINGS"
description = "Custom key bindings"

[[command.flags]]
name = "--query"
short = "-q"
arg = "STR"
description = "Initial query string"

[[command.flags]]
name = "--filter"
short = "-f"
arg = "STR"
description = "Filter mode"

[[command.flags]]
name = "--height"
arg = "HEIGHT"
description = "Display height"

[[command.flags]]
name = "--reverse"
description = "Reverse layout"

[[command.flags]]
name = "--select-1"
short = "-1"
description = "Auto-select if single match"

[[command.flags]]
name = "--exit-0"
short = "-0"
description = "Exit if no match"

[[command.flags]]
name = "--delimiter"
short = "-d"
arg = "STR"
description = "Field delimiter"

[[command.flags]]
name = "--header"
arg = "STR"
description = "Sticky header"

[[command.flags]]
name = "--preview-window"
arg = "OPTS"
description = "Preview window layout"

[[command.flags]]
name = "--exact"
short = "-e"
description = "Enable exact-match"

[[command.flags]]
name = "--tac"
description = "Reverse input order"

[[command.flags]]
name = "--ansi"
description = "Enable ANSI color processing"
