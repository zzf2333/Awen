[command]
name = "ln"
description = "Create links between files"

[[command.flags]]
name = "--symbolic"
short = "-s"
description = "Create symbolic link"

[[command.flags]]
name = "--force"
short = "-f"
description = "Remove existing destination"

[[command.flags]]
name = "--verbose"
short = "-v"
description = "Explain what is being done"

[[command.flags]]
name = "--relative"
short = "-r"
description = "Create relative symbolic link"

[[command.flags]]
name = "--no-dereference"
short = "-n"
description = "Do not dereference symlinks"
