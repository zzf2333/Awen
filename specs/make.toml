[command]
name = "make"
description = "Build automation tool"

[[command.flags]]
name = "-j"
arg = "NUM"
description = "Parallel jobs"

[[command.flags]]
name = "-f"
arg = "FILE"
description = "Use specified makefile"

[[command.flags]]
name = "-C"
arg = "DIR"
description = "Change directory first"

[[command.flags]]
name = "-n"
description = "Dry run"

[[command.flags]]
name = "-B"
description = "Unconditional make"

[[command.flags]]
name = "-k"
description = "Keep going on error"

[[command.flags]]
name = "-s"
description = "Silent mode"

[[command.flags]]
name = "-p"
description = "Print database"
