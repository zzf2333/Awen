[command]
name = "top"
description = "Display system processes"

[[command.flags]]
name = "-b"
description = "Batch mode"
os = "linux"

[[command.flags]]
name = "-n"
arg = "N"
description = "Number of iterations"

[[command.flags]]
name = "-d"
arg = "SECONDS"
description = "Delay between updates"

[[command.flags]]
name = "-p"
arg = "PID"
description = "Monitor specific PID"
os = "linux"

[[command.flags]]
name = "-u"
arg = "USER"
description = "Show only user's processes"
os = "linux"

[[command.flags]]
name = "-o"
arg = "FIELD"
description = "Sort by field"

[[command.flags]]
name = "-l"
arg = "N"
description = "Logging mode with N samples"
os = "macos"
