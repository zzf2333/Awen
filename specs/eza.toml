[command]
name = "eza"
description = "Modern replacement for ls"

[[command.flags]]
name = "--long"
short = "-l"
description = "Long format with details"

[[command.flags]]
name = "--all"
short = "-a"
description = "Show hidden files"

[[command.flags]]
name = "--tree"
short = "-T"
description = "Recurse into directories as a tree"

[[command.flags]]
name = "--git"
description = "Show git status"

[[command.flags]]
name = "--icons"
description = "Show file type icons"

[[command.flags]]
name = "--group-directories-first"
description = "List directories before files"

[[command.flags]]
name = "--level"
short = "-L"
arg = "N"
description = "Limit tree depth"

[[command.flags]]
name = "--reverse"
short = "-r"
description = "Reverse sort order"

[[command.flags]]
name = "--sort"
short = "-s"
arg = "FIELD"
description = "Sort by field (name, size, date, type)"

[[command.flags]]
name = "--recurse"
short = "-R"
description = "Recurse into directories"

[[command.flags]]
name = "--git-ignore"
description = "Ignore files in .gitignore"

[[command.flags]]
name = "--oneline"
short = "-1"
description = "One entry per line"

[[command.flags]]
name = "--header"
short = "-h"
description = "Add header row"

[[command.flags]]
name = "--time-style"
arg = "STYLE"
description = "Timestamp format"

[[command.flags]]
name = "--no-permissions"
description = "Suppress permissions column"

[[command.flags]]
name = "--no-user"
description = "Suppress user column"
