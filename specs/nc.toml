[command]
name = "nc"
description = "Networking utility (netcat)"

[[command.flags]]
name = "-l"
description = "Listen mode"

[[command.flags]]
name = "-p"
arg = "PORT"
description = "Local port"

[[command.flags]]
name = "-u"
description = "UDP mode"

[[command.flags]]
name = "-z"
description = "Zero-I/O mode (port scan)"

[[command.flags]]
name = "-v"
description = "Verbose output"

[[command.flags]]
name = "-w"
arg = "SECONDS"
description = "Connection timeout"

[[command.flags]]
name = "-k"
description = "Keep listening after disconnect"

[[command.flags]]
name = "-n"
description = "No DNS resolution"

[[command.flags]]
name = "-4"
description = "Use IPv4 only"

[[command.flags]]
name = "-6"
description = "Use IPv6 only"
