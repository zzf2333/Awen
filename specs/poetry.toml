[command]
name = "poetry"
description = "Python dependency management and packaging"

[[command.flags]]
name = "--verbose"
short = "-v"
description = "Increase verbosity"
[[command.flags]]
name = "--quiet"
short = "-q"
description = "Suppress output"
[[command.flags]]
name = "--no-interaction"
short = "-n"
description = "Do not ask interactive questions"
[[command.flags]]
name = "--no-plugins"
description = "Disable all plugins"
[[command.flags]]
name = "--directory"
short = "-C"
arg = "DIR"
description = "Set the working directory"

[[command.subcommands]]
name = "new"
description = "Create a new project"

[[command.subcommands]]
name = "init"
description = "Initialize pyproject.toml in current directory"

[[command.subcommands]]
name = "install"
description = "Install project dependencies"
[[command.subcommands.flags]]
name = "--no-dev"
description = "Skip dev dependencies"
[[command.subcommands.flags]]
name = "--sync"
description = "Remove packages not in lockfile"
[[command.subcommands.flags]]
name = "--no-root"
description = "Skip installing the project itself"
[[command.subcommands.flags]]
name = "--extras"
short = "-E"
arg = "EXTRAS"
description = "Extra sets of dependencies to install"
[[command.subcommands.flags]]
name = "--only"
arg = "GROUP"
description = "Install only the specified group"
[[command.subcommands.flags]]
name = "--with"
arg = "GROUP"
description = "Include the specified dependency group"
[[command.subcommands.flags]]
name = "--without"
arg = "GROUP"
description = "Exclude the specified dependency group"

[[command.subcommands]]
name = "update"
description = "Update dependencies"
[[command.subcommands.flags]]
name = "--dry-run"
description = "Show what would be updated"
[[command.subcommands.flags]]
name = "--lock"
description = "Only update the lockfile"

[[command.subcommands]]
name = "add"
description = "Add a dependency"
[[command.subcommands.flags]]
name = "--group"
short = "-G"
arg = "GROUP"
description = "Add to dependency group"
[[command.subcommands.flags]]
name = "--dev"
short = "-D"
description = "Add as dev dependency"
[[command.subcommands.flags]]
name = "--editable"
short = "-e"
description = "Add in editable mode"
[[command.subcommands.flags]]
name = "--extras"
short = "-E"
arg = "EXTRAS"
description = "Extras to activate"
[[command.subcommands.flags]]
name = "--optional"
description = "Add as optional dependency"
[[command.subcommands.flags]]
name = "--source"
arg = "SOURCE"
description = "Source to use for the package"

[[command.subcommands]]
name = "remove"
description = "Remove a dependency"
[[command.subcommands.flags]]
name = "--group"
short = "-G"
arg = "GROUP"
description = "Remove from dependency group"
[[command.subcommands.flags]]
name = "--dev"
short = "-D"
description = "Remove from dev dependencies"

[[command.subcommands]]
name = "show"
description = "Show package information"
[[command.subcommands.flags]]
name = "--tree"
description = "Show dependency tree"
[[command.subcommands.flags]]
name = "--latest"
short = "-l"
description = "Show latest versions"
[[command.subcommands.flags]]
name = "--outdated"
short = "-o"
description = "Show outdated packages only"

[[command.subcommands]]
name = "build"
description = "Build the project package"

[[command.subcommands]]
name = "publish"
description = "Publish the package to a registry"

[[command.subcommands]]
name = "config"
description = "Manage configuration"
[[command.subcommands.flags]]
name = "--list"
description = "List current configuration"
[[command.subcommands.flags]]
name = "--unset"
description = "Unset a configuration value"
[[command.subcommands.flags]]
name = "--local"
description = "Set as project-local configuration"

[[command.subcommands]]
name = "run"
description = "Run a command in the virtual environment"

[[command.subcommands]]
name = "shell"
description = "Spawn a shell within the virtual environment"

[[command.subcommands]]
name = "lock"
description = "Lock dependencies without installing"
[[command.subcommands.flags]]
name = "--no-update"
description = "Do not update locked versions"
[[command.subcommands.flags]]
name = "--check"
description = "Check lockfile is up to date"

[[command.subcommands]]
name = "export"
description = "Export the lockfile to other formats"
[[command.subcommands.flags]]
name = "--format"
short = "-f"
arg = "FORMAT"
description = "Output format (requirements.txt)"
[[command.subcommands.flags]]
name = "--output"
short = "-o"
arg = "FILE"
description = "Output file path"
[[command.subcommands.flags]]
name = "--without-hashes"
description = "Exclude hashes from output"

[[command.subcommands]]
name = "env"
description = "Manage virtual environments"
[[command.subcommands.subcommands]]
name = "use"
description = "Activate or create environment for Python version"
[[command.subcommands.subcommands]]
name = "info"
description = "Show environment information"
[[command.subcommands.subcommands]]
name = "list"
description = "List virtual environments"
[[command.subcommands.subcommands]]
name = "remove"
description = "Remove a virtual environment"

[[command.subcommands]]
name = "source"
description = "Manage package sources"
[[command.subcommands.subcommands]]
name = "add"
description = "Add a package source"
[[command.subcommands.subcommands]]
name = "remove"
description = "Remove a package source"
[[command.subcommands.subcommands]]
name = "show"
description = "Show configured sources"

[[command.subcommands]]
name = "check"
description = "Validate pyproject.toml"

[[command.subcommands]]
name = "search"
description = "Search for packages"

[[command.subcommands]]
name = "version"
description = "Show or bump the project version"

[[command.subcommands]]
name = "about"
description = "Show Poetry information"

[[command.subcommands]]
name = "list"
description = "List available commands"

[[command.subcommands]]
name = "self"
description = "Manage the Poetry installation"
[[command.subcommands.subcommands]]
name = "update"
description = "Update Poetry"
[[command.subcommands.subcommands]]
name = "add"
description = "Add a Poetry plugin"
[[command.subcommands.subcommands]]
name = "remove"
description = "Remove a Poetry plugin"
[[command.subcommands.subcommands]]
name = "install"
description = "Install Poetry plugins from lock"
[[command.subcommands.subcommands]]
name = "show"
description = "Show installed Poetry plugins"
