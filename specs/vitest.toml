[command]
name = "vitest"
description = "Vite-native testing framework"

[[command.subcommands]]
name = "run"
description = "Run tests once"

[[command.subcommands]]
name = "watch"
description = "Run tests in watch mode"

[[command.subcommands]]
name = "bench"
description = "Run benchmarks"

[[command.subcommands]]
name = "related"
description = "Run tests related to changed files"

[[command.flags]]
name = "--reporter"
arg = "REPORTER"
description = "Test reporter (default, verbose, dot, json, junit)"

[[command.flags]]
name = "--coverage"
description = "Enable coverage reporting"

[[command.flags]]
name = "--ui"
description = "Enable Vitest UI"

[[command.flags]]
name = "--config"
short = "-c"
arg = "FILE"
description = "Config file path"

[[command.flags]]
name = "--update"
short = "-u"
description = "Update snapshots"

[[command.flags]]
name = "--threads"
description = "Enable multi-threading"

[[command.flags]]
name = "--no-threads"
description = "Disable multi-threading"

[[command.flags]]
name = "--bail"
arg = "N"
description = "Stop after N failures"

[[command.flags]]
name = "--changed"
description = "Run tests for changed files"

[[command.flags]]
name = "--passWithNoTests"
description = "Pass when no tests found"
