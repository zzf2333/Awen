[command]
name = "isort"
description = "Python import sorter"

[[command.flags]]
name = "--check"
short = "-c"
description = "Check without modifying files"

[[command.flags]]
name = "--diff"
short = "-d"
description = "Show diff of changes"

[[command.flags]]
name = "--profile"
arg = "PROFILE"
description = "Formatting profile (black, django, google, pycharm)"

[[command.flags]]
name = "--project"
arg = "NAME"
description = "Known first-party project"

[[command.flags]]
name = "--settings-file"
arg = "FILE"
description = "Settings file path"

[[command.flags]]
name = "--skip"
arg = "PATH"
description = "Files to skip"

[[command.flags]]
name = "--line-length"
short = "-l"
arg = "N"
description = "Max line length"

[[command.flags]]
name = "--recursive"
description = "Recursively sort imports"

[[command.flags]]
name = "--quiet"
short = "-q"
description = "Quiet output"
