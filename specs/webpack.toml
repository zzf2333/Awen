[command]
name = "webpack"
description = "Module bundler"

[[command.flags]]
name = "--mode"
arg = "MODE"
description = "Build mode (development, production, none)"

[[command.flags]]
name = "--config"
short = "-c"
arg = "FILE"
description = "Configuration file"

[[command.flags]]
name = "--watch"
short = "-w"
description = "Watch for file changes"

[[command.flags]]
name = "--entry"
arg = "FILE"
description = "Entry point"

[[command.flags]]
name = "--output-path"
short = "-o"
arg = "DIR"
description = "Output directory"

[[command.flags]]
name = "--devtool"
arg = "TYPE"
description = "Source map type"

[[command.flags]]
name = "--stats"
arg = "PRESET"
description = "Stats output preset"

[[command.flags]]
name = "--progress"
description = "Print compilation progress"

[[command.flags]]
name = "--json"
arg = "FILE"
description = "Output stats as JSON"

[[command.flags]]
name = "--target"
arg = "TARGET"
description = "Build target (web, node, etc)"

[[command.flags]]
name = "--analyze"
description = "Analyze bundle"

[[command.subcommands]]
name = "serve"
description = "Start dev server"
[[command.subcommands.flags]]
name = "--port"
arg = "PORT"
description = "Server port"
[[command.subcommands.flags]]
name = "--open"
description = "Open browser"
