[command]
name = "gem"
description = "Ruby package manager"

[[command.subcommands]]
name = "install"
description = "Install a gem"
[[command.subcommands.flags]]
name = "--no-document"
description = "Skip documentation"
[[command.subcommands.flags]]
name = "--version"
short = "-v"
arg = "VERSION"
description = "Gem version"
[[command.subcommands.flags]]
name = "--user-install"
description = "Install in user's home"

[[command.subcommands]]
name = "uninstall"
description = "Uninstall a gem"
[[command.subcommands.flags]]
name = "--all"
short = "-a"
description = "Uninstall all versions"

[[command.subcommands]]
name = "list"
description = "List installed gems"
[[command.subcommands.flags]]
name = "--local"
short = "-l"
description = "Only local gems"

[[command.subcommands]]
name = "search"
description = "Search for gems"
[[command.subcommands.flags]]
name = "--remote"
short = "-r"
description = "Search remote gems"

[[command.subcommands]]
name = "update"
description = "Update installed gems"
[[command.subcommands.flags]]
name = "--system"
description = "Update RubyGems itself"

[[command.subcommands]]
name = "build"
description = "Build a gem from gemspec"

[[command.subcommands]]
name = "push"
description = "Push a gem to RubyGems"

[[command.subcommands]]
name = "environment"
description = "Show gem environment"

[[command.subcommands]]
name = "cleanup"
description = "Remove old gem versions"
