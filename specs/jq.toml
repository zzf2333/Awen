[command]
name = "jq"
description = "Command-line JSON processor"

[[command.flags]]
name = "--raw-output"
short = "-r"
description = "Output raw strings"

[[command.flags]]
name = "--compact-output"
short = "-c"
description = "Compact output"

[[command.flags]]
name = "--exit-status"
short = "-e"
description = "Exit with error on false/null"

[[command.flags]]
name = "--sort-keys"
short = "-S"
description = "Sort object keys"

[[command.flags]]
name = "--slurp"
short = "-s"
description = "Read entire input as array"

[[command.flags]]
name = "--raw-input"
short = "-R"
description = "Read each line as string"

[[command.flags]]
name = "--null-input"
short = "-n"
description = "No input"

[[command.flags]]
name = "--arg"
arg = "NAME VALUE"
description = "Set variable to string value"

[[command.flags]]
name = "--argjson"
arg = "NAME VALUE"
description = "Set variable to JSON value"

[[command.flags]]
name = "--tab"
description = "Use tabs for indentation"

[[command.flags]]
name = "--indent"
arg = "N"
description = "Use N spaces for indentation"

[[command.flags]]
name = "--join-output"
short = "-j"
description = "No newline after output"
