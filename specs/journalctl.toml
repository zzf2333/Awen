[command]
name = "journalctl"
description = "Query the systemd journal"

[[command.flags]]
name = "-u"
arg = "UNIT"
description = "Filter by unit"

[[command.flags]]
name = "-f"
description = "Follow new entries"

[[command.flags]]
name = "--since"
arg = "DATE"
description = "Entries since date"

[[command.flags]]
name = "--until"
arg = "DATE"
description = "Entries until date"

[[command.flags]]
name = "-n"
arg = "NUM"
description = "Number of entries"

[[command.flags]]
name = "-p"
arg = "PRIORITY"
description = "Filter by priority"

[[command.flags]]
name = "-b"
arg = "BOOT"
description = "Entries from boot"

[[command.flags]]
name = "--no-pager"
description = "Disable pager"

[[command.flags]]
name = "-o"
arg = "FORMAT"
description = "Output format"

[[command.flags]]
name = "-k"
description = "Kernel messages only"

[[command.flags]]
name = "--disk-usage"
description = "Show journal disk usage"

[[command.flags]]
name = "-r"
description = "Reverse output order"
