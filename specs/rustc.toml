[command]
name = "rustc"
description = "The Rust compiler"

[[command.flags]]
name = "--edition"
arg = "EDITION"
description = "Rust edition (2015, 2018, 2021, 2024)"

[[command.flags]]
name = "--crate-type"
arg = "TYPE"
description = "Crate type (bin, lib, rlib, dylib, cdylib, staticlib)"

[[command.flags]]
name = "-o"
arg = "FILE"
description = "Output filename"

[[command.flags]]
name = "-O"
description = "Equivalent to -C opt-level=2"

[[command.flags]]
name = "--target"
arg = "TARGET"
description = "Target triple"

[[command.flags]]
name = "-C"
arg = "KEY=VALUE"
description = "Codegen option"

[[command.flags]]
name = "--emit"
arg = "TYPE"
description = "Emit type (asm, llvm-ir, obj, link, dep-info, metadata)"

[[command.flags]]
name = "-g"
description = "Equivalent to -C debuginfo=2"

[[command.flags]]
name = "--explain"
arg = "CODE"
description = "Explain an error code"

[[command.flags]]
name = "--print"
arg = "INFO"
description = "Print compiler info"

[[command.flags]]
name = "--cfg"
arg = "SPEC"
description = "Configure compilation environment"

[[command.flags]]
name = "-W"
arg = "LINT"
description = "Set lint to warn"

[[command.flags]]
name = "-A"
arg = "LINT"
description = "Set lint to allow"

[[command.flags]]
name = "-D"
arg = "LINT"
description = "Set lint to deny"
