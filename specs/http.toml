[command]
name = "http"
description = "User-friendly HTTP client (HTTPie)"

[[command.flags]]
name = "--json"
short = "-j"
description = "Serialize data as JSON"

[[command.flags]]
name = "--form"
short = "-f"
description = "Serialize data as form fields"

[[command.flags]]
name = "--auth"
short = "-a"
arg = "USER:PASS"
description = "Authentication credentials"

[[command.flags]]
name = "--verify"
arg = "CERT"
description = "SSL certificate verification"

[[command.flags]]
name = "--download"
short = "-d"
description = "Download mode"

[[command.flags]]
name = "--output"
short = "-o"
arg = "FILE"
description = "Save output to file"

[[command.flags]]
name = "--session"
arg = "NAME"
description = "Named session"

[[command.flags]]
name = "--verbose"
short = "-v"
description = "Print full request and response"

[[command.flags]]
name = "--headers"
short = "-h"
description = "Print response headers only"

[[command.flags]]
name = "--body"
short = "-b"
description = "Print response body only"

[[command.flags]]
name = "--print"
short = "-p"
arg = "WHAT"
description = "Control output (H, h, B, b)"

[[command.flags]]
name = "--follow"
short = "-F"
description = "Follow redirects"

[[command.flags]]
name = "--timeout"
arg = "SECONDS"
description = "Connection timeout"

[[command.flags]]
name = "--check-status"
description = "Exit with error on HTTP error status"

[[command.flags]]
name = "--pretty"
arg = "STYLE"
description = "Output formatting (all, colors, format, none)"
