[command]
name = "ssh"
description = "OpenSSH remote login client"

[[command.flags]]
name = "-p"
arg = "PORT"
description = "Port to connect to"

[[command.flags]]
name = "-i"
arg = "IDENTITY_FILE"
description = "Identity file (private key)"

[[command.flags]]
name = "-L"
arg = "LOCAL:HOST:REMOTE"
description = "Local port forwarding"

[[command.flags]]
name = "-R"
arg = "REMOTE:HOST:LOCAL"
description = "Remote port forwarding"

[[command.flags]]
name = "-D"
arg = "PORT"
description = "Dynamic port forwarding (SOCKS)"

[[command.flags]]
name = "-N"
description = "No remote command (forwarding only)"

[[command.flags]]
name = "-f"
description = "Go to background"

[[command.flags]]
name = "-v"
description = "Verbose mode"

[[command.flags]]
name = "-o"
arg = "OPTION"
description = "Set configuration option"

[[command.flags]]
name = "-A"
description = "Enable agent forwarding"

[[command.flags]]
name = "-X"
description = "Enable X11 forwarding"

[[command.flags]]
name = "-t"
description = "Force pseudo-terminal"

[[command.flags]]
name = "-J"
arg = "HOST"
description = "Jump host (ProxyJump)"

[[command.flags]]
name = "-C"
description = "Request compression"
