[command]
name = "diff"
description = "Compare files line by line"

[[command.flags]]
name = "--unified"
short = "-u"
description = "Output unified diff format"

[[command.flags]]
name = "--recursive"
short = "-r"
description = "Recursively compare directories"

[[command.flags]]
name = "--brief"
short = "-q"
description = "Report only when files differ"

[[command.flags]]
name = "--side-by-side"
short = "-y"
description = "Side-by-side output"

[[command.flags]]
name = "--color"
description = "Colorize output"

[[command.flags]]
name = "--ignore-case"
short = "-i"
description = "Ignore case differences"

[[command.flags]]
name = "--ignore-all-space"
short = "-w"
description = "Ignore all whitespace"

[[command.flags]]
name = "--ignore-blank-lines"
short = "-B"
description = "Ignore blank line changes"

[[command.flags]]
name = "--stat"
description = "Show diffstat summary"
