[command]
name = "git"
description = "Distributed version control system"

[[command.subcommands]]
name = "add"
description = "Add file contents to the index"
[[command.subcommands.flags]]
name = "--all"
short = "-A"
description = "Add all changes"
[[command.subcommands.flags]]
name = "--patch"
short = "-p"
description = "Interactively choose hunks"

[[command.subcommands]]
name = "commit"
description = "Record changes to the repository"
[[command.subcommands.flags]]
name = "--message"
short = "-m"
arg = "MSG"
description = "Commit message"
[[command.subcommands.flags]]
name = "--amend"
description = "Amend the previous commit"
[[command.subcommands.flags]]
name = "--no-edit"
description = "Use previous commit message"
[[command.subcommands.flags]]
name = "--all"
short = "-a"
description = "Stage all modified files"

[[command.subcommands]]
name = "push"
description = "Update remote refs"
[[command.subcommands.flags]]
name = "--force"
short = "-f"
description = "Force push"
[[command.subcommands.flags]]
name = "--set-upstream"
short = "-u"
description = "Set upstream branch"
[[command.subcommands.flags]]
name = "--tags"
description = "Push tags"

[[command.subcommands]]
name = "pull"
description = "Fetch and integrate remote changes"
[[command.subcommands.flags]]
name = "--rebase"
short = "-r"
description = "Rebase instead of merge"
[[command.subcommands.flags]]
name = "--no-rebase"
description = "Merge instead of rebase"

[[command.subcommands]]
name = "checkout"
description = "Switch branches or restore files"
[[command.subcommands.flags]]
name = "--branch"
short = "-b"
arg = "BRANCH"
description = "Create and switch to new branch"
[[command.subcommands.flags]]
name = "--force"
short = "-f"
description = "Force switch, discard local changes"
[[command.subcommands.flags]]
name = "--track"
short = "-t"
description = "Set up tracking for new branch"
[[command.subcommands.flags]]
name = "--detach"
description = "Detach HEAD at named commit"
[[command.subcommands.flags]]
name = "--merge"
short = "-m"
description = "Merge local modifications into new branch"
[[command.subcommands.flags]]
name = "--orphan"
arg = "BRANCH"
description = "Create a new orphan branch"
[[command.subcommands.flags]]
name = "--ours"
description = "Checkout our version for unmerged files"
[[command.subcommands.flags]]
name = "--theirs"
description = "Checkout their version for unmerged files"
[[command.subcommands.flags]]
name = "--patch"
short = "-p"
description = "Interactively select hunks to discard"

[[command.subcommands]]
name = "branch"
description = "List, create, or delete branches"
[[command.subcommands.flags]]
name = "--delete"
short = "-d"
arg = "BRANCH"
description = "Delete branch"
[[command.subcommands.flags]]
name = "--all"
short = "-a"
description = "List all branches"
[[command.subcommands.flags]]
name = "--move"
short = "-m"
arg = "NEW_NAME"
description = "Rename branch"

[[command.subcommands]]
name = "merge"
description = "Join development histories"
[[command.subcommands.flags]]
name = "--no-ff"
description = "Create merge commit"
[[command.subcommands.flags]]
name = "--squash"
description = "Squash commits"
[[command.subcommands.flags]]
name = "--abort"
description = "Abort merge"

[[command.subcommands]]
name = "rebase"
description = "Reapply commits on top of another base"
[[command.subcommands.flags]]
name = "--interactive"
short = "-i"
description = "Interactive rebase"
[[command.subcommands.flags]]
name = "--abort"
description = "Abort rebase"
[[command.subcommands.flags]]
name = "--continue"
description = "Continue rebase"

[[command.subcommands]]
name = "stash"
description = "Stash changes"
[[command.subcommands.subcommands]]
name = "pop"
description = "Apply and remove stash"
[[command.subcommands.subcommands]]
name = "list"
description = "List stashes"
[[command.subcommands.subcommands]]
name = "drop"
description = "Remove a stash"

[[command.subcommands]]
name = "log"
description = "Show commit logs"
[[command.subcommands.flags]]
name = "--oneline"
description = "One line per commit"
[[command.subcommands.flags]]
name = "--graph"
description = "Show graph"
[[command.subcommands.flags]]
name = "--all"
description = "Show all branches"
[[command.subcommands.flags]]
name = "-n"
arg = "N"
description = "Limit number of commits"

[[command.subcommands]]
name = "diff"
description = "Show changes"
[[command.subcommands.flags]]
name = "--staged"
description = "Show staged changes"
[[command.subcommands.flags]]
name = "--cached"
description = "Show staged changes"
[[command.subcommands.flags]]
name = "--stat"
description = "Show diffstat"

[[command.subcommands]]
name = "status"
description = "Show working tree status"
[[command.subcommands.flags]]
name = "--short"
short = "-s"
description = "Short format"

[[command.subcommands]]
name = "clone"
description = "Clone a repository"
[[command.subcommands.flags]]
name = "--depth"
arg = "N"
description = "Shallow clone"
[[command.subcommands.flags]]
name = "--branch"
short = "-b"
arg = "BRANCH"
description = "Clone specific branch"

[[command.subcommands]]
name = "remote"
description = "Manage remotes"
[[command.subcommands.subcommands]]
name = "add"
description = "Add remote"
[[command.subcommands.subcommands]]
name = "remove"
description = "Remove remote"
[[command.subcommands.flags]]
name = "--verbose"
short = "-v"
description = "Show URLs"

[[command.subcommands]]
name = "reset"
description = "Reset current HEAD"
[[command.subcommands.flags]]
name = "--hard"
description = "Reset working tree and index"
[[command.subcommands.flags]]
name = "--soft"
description = "Keep changes staged"
[[command.subcommands.flags]]
name = "--mixed"
description = "Keep changes unstaged"

[[command.subcommands]]
name = "tag"
description = "Create, list, or delete tags"
[[command.subcommands.flags]]
name = "--annotate"
short = "-a"
description = "Create annotated tag"
[[command.subcommands.flags]]
name = "--delete"
short = "-d"
description = "Delete tag"
[[command.subcommands.flags]]
name = "--message"
short = "-m"
arg = "MSG"
description = "Tag message"

[[command.subcommands]]
name = "switch"
description = "Switch branches"
[[command.subcommands.flags]]
name = "--create"
short = "-c"
arg = "BRANCH"
description = "Create and switch"

[[command.subcommands]]
name = "cherry-pick"
description = "Apply commits from other branches"
[[command.subcommands.flags]]
name = "--no-commit"
short = "-n"
description = "Apply without committing"
[[command.subcommands.flags]]
name = "--abort"
description = "Cancel cherry-pick"
[[command.subcommands.flags]]
name = "--continue"
description = "Continue after resolving conflicts"

[[command.subcommands]]
name = "bisect"
description = "Binary search for bad commit"
[[command.subcommands.subcommands]]
name = "start"
description = "Start bisect session"
[[command.subcommands.subcommands]]
name = "bad"
description = "Mark current commit as bad"
[[command.subcommands.subcommands]]
name = "good"
description = "Mark current commit as good"
[[command.subcommands.subcommands]]
name = "reset"
description = "End bisect session"
[[command.subcommands.subcommands]]
name = "log"
description = "Show bisect log"

[[command.subcommands]]
name = "blame"
description = "Show line-by-line authorship"
[[command.subcommands.flags]]
name = "-L"
arg = "START,END"
description = "Annotate line range"
[[command.subcommands.flags]]
name = "-e"
description = "Show author email"
[[command.subcommands.flags]]
name = "-w"
description = "Ignore whitespace changes"

[[command.subcommands]]
name = "clean"
description = "Remove untracked files"
[[command.subcommands.flags]]
name = "-d"
description = "Remove directories too"
[[command.subcommands.flags]]
name = "--force"
short = "-f"
description = "Force removal"
[[command.subcommands.flags]]
name = "--dry-run"
short = "-n"
description = "Dry run"

[[command.subcommands]]
name = "revert"
description = "Revert a commit"
[[command.subcommands.flags]]
name = "--no-commit"
short = "-n"
description = "Revert without committing"
[[command.subcommands.flags]]
name = "--abort"
description = "Cancel revert"

[[command.subcommands]]
name = "worktree"
description = "Manage linked working trees"
[[command.subcommands.subcommands]]
name = "add"
description = "Create a new working tree"
[[command.subcommands.subcommands]]
name = "list"
description = "List working trees"
[[command.subcommands.subcommands]]
name = "remove"
description = "Remove a working tree"
[[command.subcommands.subcommands]]
name = "prune"
description = "Prune stale working trees"

[[command.subcommands]]
name = "submodule"
description = "Manage submodules"
[[command.subcommands.subcommands]]
name = "add"
description = "Add a submodule"
[[command.subcommands.subcommands]]
name = "init"
description = "Initialize submodules"
[[command.subcommands.subcommands]]
name = "update"
description = "Update submodules"
[[command.subcommands.subcommands.flags]]
name = "--init"
description = "Initialize before update"
[[command.subcommands.subcommands.flags]]
name = "--recursive"
description = "Update nested submodules"
[[command.subcommands.subcommands]]
name = "status"
description = "Show submodule status"
[[command.subcommands.subcommands]]
name = "deinit"
description = "Unregister submodule"

[[command.subcommands]]
name = "reflog"
description = "Manage reflog entries"
[[command.subcommands.flags]]
name = "--all"
description = "Show all refs"
[[command.subcommands.flags]]
name = "-n"
arg = "N"
description = "Limit entries"

[[command.subcommands]]
name = "show"
description = "Show commit or object"
[[command.subcommands.flags]]
name = "--stat"
description = "Show diffstat"
[[command.subcommands.flags]]
name = "--format"
arg = "FORMAT"
description = "Pretty-print format"

[[command.subcommands]]
name = "config"
description = "Get and set options"
[[command.subcommands.flags]]
name = "--global"
description = "Use global config"
[[command.subcommands.flags]]
name = "--local"
description = "Use repository config"
[[command.subcommands.flags]]
name = "--list"
short = "-l"
description = "List all settings"

[[command.subcommands]]
name = "describe"
description = "Name a commit using tags"
[[command.subcommands.flags]]
name = "--tags"
description = "Use any tag, not just annotated"
[[command.subcommands.flags]]
name = "--always"
description = "Show abbreviated commit if no tag"

[[command.subcommands]]
name = "archive"
description = "Create archive of files"
[[command.subcommands.flags]]
name = "--format"
arg = "FORMAT"
description = "Archive format (tar, zip)"
[[command.subcommands.flags]]
name = "--prefix"
arg = "PREFIX"
description = "Prepend prefix to paths"
