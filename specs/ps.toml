[command]
name = "ps"
description = "Report process status"

[[command.flags]]
name = "-e"
description = "Select all processes"

[[command.flags]]
name = "-f"
description = "Full format listing"

[[command.flags]]
name = "-p"
arg = "PID"
description = "Select by process ID"

[[command.flags]]
name = "-u"
arg = "USER"
description = "Select by user"

[[command.flags]]
name = "--sort"
arg = "KEY"
description = "Sort output by key"

[[command.flags]]
name = "-o"
arg = "FORMAT"
description = "Custom output format"

[[command.flags]]
name = "-a"
description = "All with terminal"

[[command.flags]]
name = "-x"
description = "Include no-tty processes"

[[command.flags]]
name = "--forest"
description = "Show process tree"
