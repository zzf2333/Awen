[command]
name = "mysql"
description = "MySQL command-line client"

[[command.flags]]
name = "-h"
arg = "HOST"
description = "Server hostname"

[[command.flags]]
name = "-P"
arg = "PORT"
description = "Server port"

[[command.flags]]
name = "-u"
arg = "USER"
description = "User name"

[[command.flags]]
name = "-p"
description = "Prompt for password"

[[command.flags]]
name = "-D"
arg = "DBNAME"
description = "Database to use"

[[command.flags]]
name = "-e"
arg = "STATEMENT"
description = "Execute statement and quit"

[[command.flags]]
name = "--batch"
description = "Batch mode (tab-separated)"

[[command.flags]]
name = "--table"
description = "Table output format"

[[command.flags]]
name = "--json"
description = "JSON output format"

[[command.flags]]
name = "-N"
description = "Don't write column names"

[[command.flags]]
name = "--ssl-mode"
arg = "MODE"
description = "SSL connection mode"
