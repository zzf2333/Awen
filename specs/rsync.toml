[command]
name = "rsync"
description = "Fast, versatile file copying tool"

[[command.flags]]
name = "--archive"
short = "-a"
description = "Archive mode (recursive, preserve attrs)"

[[command.flags]]
name = "--verbose"
short = "-v"
description = "Verbose output"

[[command.flags]]
name = "--compress"
short = "-z"
description = "Compress during transfer"

[[command.flags]]
name = "--delete"
description = "Delete extraneous files from dest"

[[command.flags]]
name = "--exclude"
arg = "PATTERN"
description = "Exclude matching files"

[[command.flags]]
name = "--include"
arg = "PATTERN"
description = "Include matching files"

[[command.flags]]
name = "--dry-run"
short = "-n"
description = "Show what would be transferred"

[[command.flags]]
name = "--progress"
description = "Show transfer progress"

[[command.flags]]
name = "-e"
arg = "COMMAND"
description = "Specify remote shell"

[[command.flags]]
name = "--recursive"
short = "-r"
description = "Recurse into directories"

[[command.flags]]
name = "--human-readable"
short = "-h"
description = "Human-readable sizes"

[[command.flags]]
name = "--partial"
description = "Keep partially transferred files"

[[command.flags]]
name = "--checksum"
short = "-c"
description = "Skip based on checksum"

[[command.flags]]
name = "--update"
short = "-u"
description = "Skip files newer on receiver"

[[command.flags]]
name = "--links"
short = "-l"
description = "Copy symlinks as symlinks"

[[command.flags]]
name = "--exclude-from"
arg = "FILE"
description = "Read exclude patterns from file"
