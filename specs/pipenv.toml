[command]
name = "pipenv"
description = "Python dev workflow tool"

[[command.subcommands]]
name = "install"
description = "Install packages"
[[command.subcommands.flags]]
name = "--dev"
short = "-d"
description = "Install dev dependencies"
[[command.subcommands.flags]]
name = "--skip-lock"
description = "Skip lockfile"
[[command.subcommands.flags]]
name = "--python"
arg = "VERSION"
description = "Python version"

[[command.subcommands]]
name = "uninstall"
description = "Uninstall packages"
[[command.subcommands.flags]]
name = "--all"
description = "Remove all packages"

[[command.subcommands]]
name = "lock"
description = "Generate Pipfile.lock"

[[command.subcommands]]
name = "run"
description = "Run command in virtualenv"

[[command.subcommands]]
name = "shell"
description = "Activate virtualenv shell"

[[command.subcommands]]
name = "graph"
description = "Show dependency graph"
[[command.subcommands.flags]]
name = "--reverse"
description = "Reverse graph"
[[command.subcommands.flags]]
name = "--json"
description = "Output as JSON"

[[command.subcommands]]
name = "sync"
description = "Install from Pipfile.lock"
[[command.subcommands.flags]]
name = "--dev"
short = "-d"
description = "Include dev dependencies"

[[command.subcommands]]
name = "check"
description = "Check for security vulnerabilities"

[[command.subcommands]]
name = "clean"
description = "Uninstall packages not in Pipfile"

[[command.subcommands]]
name = "update"
description = "Update packages"

[[command.subcommands]]
name = "requirements"
description = "Generate requirements.txt"
[[command.subcommands.flags]]
name = "--dev"
short = "-d"
description = "Include dev dependencies"
