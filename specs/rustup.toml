[command]
name = "rustup"
description = "Rust toolchain manager"

[[command.subcommands]]
name = "update"
description = "Update installed toolchains"

[[command.subcommands]]
name = "default"
description = "Set the default toolchain"

[[command.subcommands]]
name = "show"
description = "Show installed toolchains"

[[command.subcommands]]
name = "target"
description = "Manage compilation targets"
[[command.subcommands.subcommands]]
name = "add"
description = "Add a target"
[[command.subcommands.subcommands]]
name = "remove"
description = "Remove a target"
[[command.subcommands.subcommands]]
name = "list"
description = "List available targets"

[[command.subcommands]]
name = "component"
description = "Manage installed components"
[[command.subcommands.subcommands]]
name = "add"
description = "Add a component"
[[command.subcommands.subcommands]]
name = "remove"
description = "Remove a component"
[[command.subcommands.subcommands]]
name = "list"
description = "List available components"

[[command.subcommands]]
name = "toolchain"
description = "Manage installed toolchains"
[[command.subcommands.subcommands]]
name = "install"
description = "Install a toolchain"
[[command.subcommands.subcommands]]
name = "uninstall"
description = "Uninstall a toolchain"
[[command.subcommands.subcommands]]
name = "list"
description = "List installed toolchains"
[[command.subcommands.subcommands]]
name = "link"
description = "Link a custom toolchain"

[[command.subcommands]]
name = "override"
description = "Modify directory toolchain overrides"
[[command.subcommands.subcommands]]
name = "set"
description = "Set override for current directory"
[[command.subcommands.subcommands]]
name = "unset"
description = "Remove override"
[[command.subcommands.subcommands]]
name = "list"
description = "List overrides"

[[command.subcommands]]
name = "doc"
description = "Open Rust documentation"

[[command.subcommands]]
name = "self"
description = "Manage rustup installation"
[[command.subcommands.subcommands]]
name = "update"
description = "Update rustup"
[[command.subcommands.subcommands]]
name = "uninstall"
description = "Uninstall rustup"
