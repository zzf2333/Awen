[command]
name = "bat"
description = "Cat clone with syntax highlighting"

[[command.flags]]
name = "--language"
short = "-l"
arg = "LANG"
description = "Set syntax highlighting language"

[[command.flags]]
name = "--number"
short = "-n"
description = "Show line numbers only"

[[command.flags]]
name = "--style"
arg = "STYLE"
description = "Display style (full, plain, changes, header, grid, numbers)"

[[command.flags]]
name = "--theme"
arg = "THEME"
description = "Set color theme"

[[command.flags]]
name = "--show-all"
short = "-A"
description = "Show non-printable characters"

[[command.flags]]
name = "--paging"
arg = "WHEN"
description = "When to use pager (auto, never, always)"

[[command.flags]]
name = "--range"
short = "-r"
arg = "N:M"
description = "Show lines N to M"

[[command.flags]]
name = "--plain"
short = "-p"
description = "Plain output, no decorations"

[[command.flags]]
name = "--line-range"
arg = "N:M"
description = "Print specified line range"

[[command.flags]]
name = "--list-languages"
short = "-L"
description = "List supported languages"

[[command.flags]]
name = "--list-themes"
description = "List available themes"

[[command.flags]]
name = "--diff"
short = "-d"
description = "Show git diff markers"

[[command.flags]]
name = "--highlight-line"
short = "-H"
arg = "N"
description = "Highlight line N"

[[command.flags]]
name = "--color"
arg = "WHEN"
description = "When to use colors"
