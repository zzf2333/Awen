[command]
name = "xargs"
description = "Build commands from stdin"

[[command.flags]]
name = "-I"
arg = "REPLACE"
description = "Replace string in command"

[[command.flags]]
name = "-n"
arg = "NUM"
description = "Max args per command line"

[[command.flags]]
name = "-P"
arg = "NUM"
description = "Max parallel processes"

[[command.flags]]
name = "-0"
description = "Use null byte as delimiter"

[[command.flags]]
name = "-t"
description = "Print commands before running"

[[command.flags]]
name = "-r"
description = "Do not run if stdin is empty"

[[command.flags]]
name = "-L"
arg = "NUM"
description = "Max input lines per command"
