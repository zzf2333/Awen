[command]
name = "eslint"
description = "JavaScript and TypeScript linter"

[[command.flags]]
name = "--fix"
description = "Automatically fix problems"

[[command.flags]]
name = "--config"
short = "-c"
arg = "FILE"
description = "Configuration file"

[[command.flags]]
name = "--ext"
arg = "EXT"
description = "File extensions to check"

[[command.flags]]
name = "--ignore-pattern"
arg = "PATTERN"
description = "Pattern of files to ignore"

[[command.flags]]
name = "--format"
short = "-f"
arg = "FORMAT"
description = "Output format"

[[command.flags]]
name = "--cache"
description = "Only check changed files"

[[command.flags]]
name = "--max-warnings"
arg = "N"
description = "Max warning count before error"

[[command.flags]]
name = "--no-error-on-unmatched-pattern"
description = "Don't error on unmatched globs"

[[command.flags]]
name = "--rule"
arg = "RULE"
description = "Specify rules"

[[command.flags]]
name = "--debug"
description = "Output debug info"

[[command.flags]]
name = "--quiet"
description = "Report errors only"

[[command.flags]]
name = "--fix-dry-run"
description = "Preview auto-fix without writing"

[[command.flags]]
name = "--init"
description = "Initialize configuration"

[[command.flags]]
name = "--no-eslintrc"
description = "Disable config file lookup"

[[command.flags]]
name = "--env"
arg = "ENV"
description = "Specify environments"
