[command]
name = "htop"
description = "Interactive process viewer"

[[command.flags]]
name = "-d"
arg = "DELAY"
description = "Update interval in tenths"

[[command.flags]]
name = "-u"
arg = "USER"
description = "Show user processes only"

[[command.flags]]
name = "-p"
arg = "PID"
description = "Monitor specific PIDs"

[[command.flags]]
name = "-s"
arg = "COLUMN"
description = "Sort by column"

[[command.flags]]
name = "-t"
description = "Tree view"

[[command.flags]]
name = "-C"
description = "No color"
