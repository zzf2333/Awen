[command]
name = "openssl"
description = "Cryptography and SSL/TLS toolkit"

[[command.subcommands]]
name = "req"
description = "Certificate request management"
[[command.subcommands.flags]]
name = "-new"
description = "Generate new request"
[[command.subcommands.flags]]
name = "-x509"
description = "Output self-signed certificate"
[[command.subcommands.flags]]
name = "-key"
arg = "FILE"
description = "Private key file"
[[command.subcommands.flags]]
name = "-out"
arg = "FILE"
description = "Output file"
[[command.subcommands.flags]]
name = "-days"
arg = "N"
description = "Certificate validity days"
[[command.subcommands.flags]]
name = "-subj"
arg = "SUBJECT"
description = "Set subject"
[[command.subcommands.flags]]
name = "-nodes"
description = "No DES encryption on private key"
[[command.subcommands.flags]]
name = "-newkey"
arg = "TYPE:BITS"
description = "Generate new key and request"

[[command.subcommands]]
name = "x509"
description = "Certificate display and signing"
[[command.subcommands.flags]]
name = "-in"
arg = "FILE"
description = "Input file"
[[command.subcommands.flags]]
name = "-out"
arg = "FILE"
description = "Output file"
[[command.subcommands.flags]]
name = "-text"
description = "Print in text form"
[[command.subcommands.flags]]
name = "-noout"
description = "Suppress output of encoded data"
[[command.subcommands.flags]]
name = "-dates"
description = "Show validity dates"
[[command.subcommands.flags]]
name = "-fingerprint"
description = "Show certificate fingerprint"

[[command.subcommands]]
name = "genrsa"
description = "Generate RSA private key"
[[command.subcommands.flags]]
name = "-out"
arg = "FILE"
description = "Output file"

[[command.subcommands]]
name = "s_client"
description = "SSL/TLS client"
[[command.subcommands.flags]]
name = "-connect"
arg = "HOST:PORT"
description = "Server to connect to"
[[command.subcommands.flags]]
name = "-servername"
arg = "NAME"
description = "TLS SNI extension"
[[command.subcommands.flags]]
name = "-showcerts"
description = "Show full certificate chain"

[[command.subcommands]]
name = "enc"
description = "Encrypt or decrypt data"
[[command.subcommands.flags]]
name = "-d"
description = "Decrypt"
[[command.subcommands.flags]]
name = "-in"
arg = "FILE"
description = "Input file"
[[command.subcommands.flags]]
name = "-out"
arg = "FILE"
description = "Output file"
[[command.subcommands.flags]]
name = "-base64"
description = "Base64 encode/decode"
[[command.subcommands.flags]]
name = "-aes-256-cbc"
description = "Use AES-256-CBC cipher"

[[command.subcommands]]
name = "dgst"
description = "Message digest calculation"
[[command.subcommands.flags]]
name = "-sha256"
description = "Use SHA-256"
[[command.subcommands.flags]]
name = "-md5"
description = "Use MD5"
[[command.subcommands.flags]]
name = "-sign"
arg = "KEY"
description = "Sign digest with private key"
[[command.subcommands.flags]]
name = "-verify"
arg = "KEY"
description = "Verify signature"

[[command.subcommands]]
name = "version"
description = "Print OpenSSL version"
