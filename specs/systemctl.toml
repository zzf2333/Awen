[command]
name = "systemctl"
description = "Control the systemd manager"

[[command.subcommands]]
name = "start"
description = "Start a unit"

[[command.subcommands]]
name = "stop"
description = "Stop a unit"

[[command.subcommands]]
name = "restart"
description = "Restart a unit"

[[command.subcommands]]
name = "reload"
description = "Reload a unit"

[[command.subcommands]]
name = "status"
description = "Show unit status"

[[command.subcommands]]
name = "enable"
description = "Enable a unit"

[[command.subcommands]]
name = "disable"
description = "Disable a unit"

[[command.subcommands]]
name = "daemon-reload"
description = "Reload systemd manager"

[[command.subcommands]]
name = "list-units"
description = "List loaded units"
[[command.subcommands.flags]]
name = "--type"
arg = "TYPE"
description = "Filter by unit type"
[[command.subcommands.flags]]
name = "--state"
arg = "STATE"
description = "Filter by unit state"

[[command.subcommands]]
name = "is-active"
description = "Check if unit is active"

[[command.subcommands]]
name = "is-enabled"
description = "Check if unit is enabled"

[[command.subcommands]]
name = "mask"
description = "Mask a unit"

[[command.subcommands]]
name = "unmask"
description = "Unmask a unit"
