[command]
name = "npm"
description = "Node package manager"

[[command.subcommands]]
name = "install"
description = "Install packages"
[[command.subcommands.flags]]
name = "--save-dev"
short = "-D"
description = "Save as dev dependency"
[[command.subcommands.flags]]
name = "--global"
short = "-g"
description = "Install globally"
[[command.subcommands.flags]]
name = "--save-exact"
short = "-E"
description = "Save exact version"
[[command.subcommands.flags]]
name = "--legacy-peer-deps"
description = "Ignore peer dependency issues"

[[command.subcommands]]
name = "run"
description = "Run script"

[[command.subcommands]]
name = "test"
description = "Run tests"

[[command.subcommands]]
name = "start"
description = "Start application"

[[command.subcommands]]
name = "init"
description = "Create package.json"
[[command.subcommands.flags]]
name = "--yes"
short = "-y"
description = "Skip questionnaire"

[[command.subcommands]]
name = "uninstall"
description = "Remove package"
[[command.subcommands.flags]]
name = "--save-dev"
short = "-D"
description = "Remove from dev dependencies"

[[command.subcommands]]
name = "update"
description = "Update packages"

[[command.subcommands]]
name = "outdated"
description = "Check for outdated packages"

[[command.subcommands]]
name = "list"
description = "List installed packages"
[[command.subcommands.flags]]
name = "--depth"
arg = "N"
description = "Dependency depth"

[[command.subcommands]]
name = "publish"
description = "Publish package"
[[command.subcommands.flags]]
name = "--access"
arg = "ACCESS"
description = "Set access level"
[[command.subcommands.flags]]
name = "--tag"
arg = "TAG"
description = "Publish tag"

[[command.subcommands]]
name = "audit"
description = "Run security audit"
[[command.subcommands.flags]]
name = "--fix"
description = "Fix vulnerabilities"

[[command.subcommands]]
name = "ci"
description = "Clean install for CI"

[[command.subcommands]]
name = "exec"
description = "Run a command from a local or remote package"

[[command.subcommands]]
name = "link"
description = "Symlink a package"

[[command.subcommands]]
name = "version"
description = "Bump package version"
[[command.subcommands.flags]]
name = "--no-git-tag-version"
description = "Skip git tagging"

[[command.subcommands]]
name = "info"
description = "Show package information"

[[command.subcommands]]
name = "search"
description = "Search the registry"

[[command.subcommands]]
name = "view"
description = "View registry info for a package"

[[command.subcommands]]
name = "cache"
description = "Manage the npm cache"
[[command.subcommands.subcommands]]
name = "clean"
description = "Delete all cache data"
[[command.subcommands.subcommands]]
name = "ls"
description = "List cache contents"
[[command.subcommands.subcommands]]
name = "verify"
description = "Verify cache integrity"

[[command.subcommands]]
name = "login"
description = "Log in to the registry"

[[command.subcommands]]
name = "logout"
description = "Log out of the registry"

[[command.subcommands]]
name = "pack"
description = "Create a tarball from a package"

[[command.subcommands]]
name = "doctor"
description = "Check environment"

[[command.subcommands]]
name = "diff"
description = "Diff between package versions"

[[command.subcommands]]
name = "fund"
description = "Show funding information"
