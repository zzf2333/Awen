[command]
name = "zoxide"
description = "Smarter cd command"

[[command.subcommands]]
name = "add"
description = "Add a directory to the database"

[[command.subcommands]]
name = "remove"
description = "Remove a directory from the database"

[[command.subcommands]]
name = "query"
description = "Search for a directory"
[[command.subcommands.flags]]
name = "--interactive"
short = "-i"
description = "Interactive selection"
[[command.subcommands.flags]]
name = "--list"
short = "-l"
description = "List all matches"
[[command.subcommands.flags]]
name = "--score"
short = "-s"
description = "Show scores"
[[command.subcommands.flags]]
name = "--exclude"
arg = "DIR"
description = "Exclude a directory"

[[command.subcommands]]
name = "init"
description = "Generate shell configuration"

[[command.subcommands]]
name = "import"
description = "Import entries from another tool"
[[command.subcommands.flags]]
name = "--from"
arg = "TOOL"
description = "Source tool (autojump, z)"
