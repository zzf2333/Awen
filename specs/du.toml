[command]
name = "du"
description = "Estimate file space usage"

[[command.flags]]
name = "-h"
description = "Human-readable sizes"

[[command.flags]]
name = "-s"
description = "Summarize total only"

[[command.flags]]
name = "-d"
arg = "DEPTH"
description = "Max display depth"

[[command.flags]]
name = "--max-depth"
arg = "NUM"
description = "Max directory depth"

[[command.flags]]
name = "-a"
description = "Show all files"

[[command.flags]]
name = "-c"
description = "Show grand total"

[[command.flags]]
name = "--exclude"
arg = "PATTERN"
description = "Exclude matching files"

[[command.flags]]
name = "-L"
description = "Follow symbolic links"
