[command]
name = "redis-cli"
description = "Redis command-line interface"

[[command.flags]]
name = "-h"
arg = "HOST"
description = "Server hostname"

[[command.flags]]
name = "-p"
arg = "PORT"
description = "Server port"

[[command.flags]]
name = "-a"
arg = "PASSWORD"
description = "Authentication password"

[[command.flags]]
name = "-n"
arg = "DB"
description = "Database number"

[[command.flags]]
name = "--scan"
description = "Scan for keys"

[[command.flags]]
name = "--pipe"
description = "Transfer raw protocol"

[[command.flags]]
name = "--bigkeys"
description = "Scan for big keys"

[[command.flags]]
name = "--stat"
description = "Rolling stats mode"

[[command.flags]]
name = "--latency"
description = "Latency monitoring mode"

[[command.flags]]
name = "-u"
arg = "URI"
description = "Server URI"

[[command.flags]]
name = "--cluster"
description = "Enable cluster mode"
