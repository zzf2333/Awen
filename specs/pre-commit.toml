[command]
name = "pre-commit"
description = "Git pre-commit hook manager"

[[command.subcommands]]
name = "install"
description = "Install git hooks"
[[command.subcommands.flags]]
name = "--hook-type"
short = "-t"
arg = "TYPE"
description = "Hook type (pre-commit, pre-push, commit-msg)"

[[command.subcommands]]
name = "run"
description = "Run hooks on staged files"
[[command.subcommands.flags]]
name = "--all-files"
short = "-a"
description = "Run on all files"
[[command.subcommands.flags]]
name = "--files"
arg = "FILES"
description = "Run on specific files"

[[command.subcommands]]
name = "autoupdate"
description = "Update hook versions"
[[command.subcommands.flags]]
name = "--bleeding-edge"
description = "Update to latest commit"

[[command.subcommands]]
name = "clean"
description = "Clean cached hooks"

[[command.subcommands]]
name = "sample-config"
description = "Print sample configuration"

[[command.subcommands]]
name = "uninstall"
description = "Uninstall git hooks"

[[command.subcommands]]
name = "try-repo"
description = "Try hooks from a repo"

[[command.subcommands]]
name = "validate-config"
description = "Validate config files"

[[command.subcommands]]
name = "validate-manifest"
description = "Validate manifest files"
