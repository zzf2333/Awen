[command]
name = "ip"
description = "Show and manipulate network devices"

[[command.flags]]
name = "-4"
description = "IPv4 only"

[[command.flags]]
name = "-6"
description = "IPv6 only"

[[command.flags]]
name = "--brief"
short = "-b"
description = "Brief output"

[[command.flags]]
name = "--color"
short = "-c"
description = "Color output"

[[command.subcommands]]
name = "addr"
description = "Manage IP addresses"
[[command.subcommands.subcommands]]
name = "show"
description = "Show addresses"
[[command.subcommands.subcommands]]
name = "add"
description = "Add an address"
[[command.subcommands.subcommands]]
name = "del"
description = "Delete an address"

[[command.subcommands]]
name = "link"
description = "Manage network interfaces"
[[command.subcommands.subcommands]]
name = "show"
description = "Show interfaces"
[[command.subcommands.subcommands]]
name = "set"
description = "Change interface attributes"

[[command.subcommands]]
name = "route"
description = "Manage routing table"
[[command.subcommands.subcommands]]
name = "show"
description = "Show routes"
[[command.subcommands.subcommands]]
name = "add"
description = "Add a route"
[[command.subcommands.subcommands]]
name = "del"
description = "Delete a route"
[[command.subcommands.subcommands]]
name = "get"
description = "Get route for address"

[[command.subcommands]]
name = "neigh"
description = "Manage ARP/NDP cache"
[[command.subcommands.subcommands]]
name = "show"
description = "Show neighbors"
[[command.subcommands.subcommands]]
name = "add"
description = "Add neighbor entry"
[[command.subcommands.subcommands]]
name = "del"
description = "Delete neighbor entry"
