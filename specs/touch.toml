[command]
name = "touch"
description = "Change file timestamps"

[[command.flags]]
name = "-a"
description = "Change access time only"

[[command.flags]]
name = "-m"
description = "Change modification time only"

[[command.flags]]
name = "-t"
arg = "TIMESTAMP"
description = "Use specific timestamp"

[[command.flags]]
name = "--reference"
short = "-r"
arg = "FILE"
description = "Use reference file's times"

[[command.flags]]
name = "--no-create"
short = "-c"
description = "Do not create new files"
