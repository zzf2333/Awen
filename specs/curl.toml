[command]
name = "curl"
description = "Transfer data from or to a server"

[[command.flags]]
name = "--output"
short = "-o"
arg = "FILE"
description = "Write output to file"

[[command.flags]]
name = "--location"
short = "-L"
description = "Follow redirects"

[[command.flags]]
name = "--silent"
short = "-s"
description = "Silent mode"

[[command.flags]]
name = "--show-error"
short = "-S"
description = "Show errors in silent mode"

[[command.flags]]
name = "--fail"
short = "-f"
description = "Fail silently on HTTP errors"

[[command.flags]]
name = "--header"
short = "-H"
arg = "HEADER"
description = "Pass custom header"

[[command.flags]]
name = "--data"
short = "-d"
arg = "DATA"
description = "Send POST data"

[[command.flags]]
name = "--request"
short = "-X"
arg = "METHOD"
description = "HTTP method"

[[command.flags]]
name = "--user"
short = "-u"
arg = "USER:PASS"
description = "Server user and password"

[[command.flags]]
name = "--cookie"
short = "-b"
arg = "DATA"
description = "Send cookies"

[[command.flags]]
name = "--insecure"
short = "-k"
description = "Skip TLS verification"

[[command.flags]]
name = "--verbose"
short = "-v"
description = "Verbose output"

[[command.flags]]
name = "--form"
short = "-F"
arg = "KEY=VALUE"
description = "Form data"

[[command.flags]]
name = "--upload-file"
short = "-T"
arg = "FILE"
description = "Upload file"

[[command.flags]]
name = "--connect-timeout"
arg = "SECONDS"
description = "Connection timeout"

[[command.flags]]
name = "--max-time"
short = "-m"
arg = "SECONDS"
description = "Maximum time"

[[command.flags]]
name = "--retry"
arg = "N"
description = "Retry on failure"

[[command.flags]]
name = "--compressed"
description = "Request compressed response"

[[command.flags]]
name = "--json"
arg = "DATA"
description = "Send JSON data"

[[command.flags]]
name = "--head"
short = "-I"
description = "Show response headers only"

[[command.flags]]
name = "--remote-name"
short = "-O"
description = "Save as remote filename"

[[command.flags]]
name = "--proxy"
short = "-x"
arg = "URL"
description = "Use proxy"

[[command.flags]]
name = "--cookie-jar"
short = "-c"
arg = "FILE"
description = "Write cookies to file"
