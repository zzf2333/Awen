[command]
name = "kubectl"
description = "Kubernetes CLI"

[[command.subcommands]]
name = "get"
description = "Display resources"
[[command.subcommands.flags]]
name = "--output"
short = "-o"
arg = "FORMAT"
description = "Output format"
[[command.subcommands.flags]]
name = "--namespace"
short = "-n"
arg = "NS"
description = "Target namespace"
[[command.subcommands.flags]]
name = "--selector"
short = "-l"
arg = "LABEL"
description = "Label selector"
[[command.subcommands.flags]]
name = "--all-namespaces"
short = "-A"
description = "All namespaces"
[[command.subcommands.flags]]
name = "--sort-by"
arg = "FIELD"
description = "Sort by field"

[[command.subcommands]]
name = "apply"
description = "Apply configuration"
[[command.subcommands.flags]]
name = "--filename"
short = "-f"
arg = "FILE"
description = "Config file or directory"
[[command.subcommands.flags]]
name = "--kustomize"
short = "-k"
arg = "DIR"
description = "Kustomize directory"
[[command.subcommands.flags]]
name = "--dry-run"
arg = "MODE"
description = "Dry run mode"

[[command.subcommands]]
name = "delete"
description = "Delete resources"
[[command.subcommands.flags]]
name = "--filename"
short = "-f"
arg = "FILE"
description = "Config file"
[[command.subcommands.flags]]
name = "--namespace"
short = "-n"
arg = "NS"
description = "Target namespace"
[[command.subcommands.flags]]
name = "--grace-period"
arg = "SEC"
description = "Grace period in seconds"
[[command.subcommands.flags]]
name = "--force"
description = "Force deletion"

[[command.subcommands]]
name = "describe"
description = "Show resource details"
[[command.subcommands.flags]]
name = "--namespace"
short = "-n"
arg = "NS"
description = "Target namespace"

[[command.subcommands]]
name = "logs"
description = "Print container logs"
[[command.subcommands.flags]]
name = "--follow"
short = "-f"
description = "Stream logs"
[[command.subcommands.flags]]
name = "--namespace"
short = "-n"
arg = "NS"
description = "Target namespace"
[[command.subcommands.flags]]
name = "--tail"
arg = "NUM"
description = "Lines from end"
[[command.subcommands.flags]]
name = "--container"
short = "-c"
arg = "NAME"
description = "Target container"
[[command.subcommands.flags]]
name = "--previous"
short = "-p"
description = "Previous container logs"
[[command.subcommands.flags]]
name = "--since"
arg = "DURATION"
description = "Logs since duration"

[[command.subcommands]]
name = "exec"
description = "Execute in a container"
[[command.subcommands.flags]]
name = "-it"
description = "Interactive terminal"
[[command.subcommands.flags]]
name = "--namespace"
short = "-n"
arg = "NS"
description = "Target namespace"
[[command.subcommands.flags]]
name = "--container"
short = "-c"
arg = "NAME"
description = "Target container"

[[command.subcommands]]
name = "port-forward"
description = "Forward local port"
[[command.subcommands.flags]]
name = "--namespace"
short = "-n"
arg = "NS"
description = "Target namespace"
[[command.subcommands.flags]]
name = "--address"
arg = "ADDR"
description = "Listen address"

[[command.subcommands]]
name = "scale"
description = "Scale a resource"
[[command.subcommands.flags]]
name = "--replicas"
arg = "NUM"
description = "Number of replicas"
[[command.subcommands.flags]]
name = "--namespace"
short = "-n"
arg = "NS"
description = "Target namespace"

[[command.subcommands]]
name = "config"
description = "Modify kubeconfig"
[[command.subcommands.subcommands]]
name = "use-context"
description = "Set current context"
[[command.subcommands.subcommands]]
name = "get-contexts"
description = "List contexts"
[[command.subcommands.subcommands]]
name = "current-context"
description = "Show current context"
[[command.subcommands.subcommands]]
name = "set-context"
description = "Set a context entry"

[[command.subcommands]]
name = "create"
description = "Create a resource"
[[command.subcommands.flags]]
name = "--filename"
short = "-f"
arg = "FILE"
description = "Config file"
[[command.subcommands.flags]]
name = "--namespace"
short = "-n"
arg = "NS"
description = "Target namespace"

[[command.subcommands]]
name = "rollout"
description = "Manage rollouts"
[[command.subcommands.subcommands]]
name = "status"
description = "Show rollout status"
[[command.subcommands.subcommands]]
name = "restart"
description = "Restart a resource"
[[command.subcommands.subcommands]]
name = "undo"
description = "Undo a rollout"
[[command.subcommands.subcommands]]
name = "history"
description = "View rollout history"

[[command.subcommands]]
name = "top"
description = "Display resource usage"
[[command.subcommands.subcommands]]
name = "pods"
description = "Show pod metrics"
[[command.subcommands.subcommands]]
name = "nodes"
description = "Show node metrics"
