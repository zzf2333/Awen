[command]
name = "next"
description = "Next.js framework CLI"

[[command.subcommands]]
name = "dev"
description = "Start development server"
[[command.subcommands.flags]]
name = "--port"
short = "-p"
arg = "PORT"
description = "Server port"
[[command.subcommands.flags]]
name = "--hostname"
short = "-H"
arg = "HOST"
description = "Server hostname"
[[command.subcommands.flags]]
name = "--turbopack"
description = "Use Turbopack"

[[command.subcommands]]
name = "build"
description = "Build for production"
[[command.subcommands.flags]]
name = "--debug"
description = "Enable verbose build output"

[[command.subcommands]]
name = "start"
description = "Start production server"
[[command.subcommands.flags]]
name = "--port"
short = "-p"
arg = "PORT"
description = "Server port"

[[command.subcommands]]
name = "lint"
description = "Run ESLint"
[[command.subcommands.flags]]
name = "--fix"
description = "Auto-fix linting issues"
[[command.subcommands.flags]]
name = "--dir"
arg = "DIR"
description = "Directories to lint"

[[command.subcommands]]
name = "info"
description = "Print environment info"

[[command.subcommands]]
name = "telemetry"
description = "Manage telemetry"
