[command]
name = "less"
description = "View file contents page by page"

[[command.flags]]
name = "-N"
description = "Show line numbers"

[[command.flags]]
name = "-S"
description = "Chop long lines"

[[command.flags]]
name = "-R"
description = "Show ANSI colors"

[[command.flags]]
name = "-F"
description = "Quit if one screen"

[[command.flags]]
name = "-X"
description = "Don't clear screen on exit"

[[command.flags]]
name = "-i"
description = "Case-insensitive search"

[[command.flags]]
name = "-g"
description = "Highlight only last search match"

[[command.flags]]
name = "-n"
description = "Suppress line numbers"

[[command.flags]]
name = "+"
arg = "COMMAND"
description = "Run command on startup"
