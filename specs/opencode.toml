[command]
name = "opencode"
description = "Terminal AI coding tool"

[[command.flags]]
name = "--version"
short = "-v"
description = "Show version"

[[command.flags]]
name = "--help"
short = "-h"
description = "Show help"

[[command.flags]]
name = "--debug"
description = "Enable debug logging"

[[command.flags]]
name = "--cwd"
arg = "DIR"
description = "Working directory"
