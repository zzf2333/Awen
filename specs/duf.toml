[command]
name = "duf"
description = "Disk usage utility with style"

[[command.flags]]
name = "--all"
description = "Show all filesystems"

[[command.flags]]
name = "--json"
description = "Output as JSON"

[[command.flags]]
name = "--only"
arg = "TYPE"
description = "Only show specific types (local, network, fuse, special, loops, binds)"

[[command.flags]]
name = "--hide"
arg = "TYPE"
description = "Hide specific types"

[[command.flags]]
name = "--sort"
arg = "COLUMN"
description = "Sort by column (mountpoint, size, used, avail, usage, type)"

[[command.flags]]
name = "--output"
arg = "FIELDS"
description = "Output columns"

[[command.flags]]
name = "--theme"
arg = "THEME"
description = "Color theme (dark, light)"

[[command.flags]]
name = "--width"
arg = "N"
description = "Max output width"
