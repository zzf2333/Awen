[command]
name = "sort"
description = "Sort lines of text files"

[[command.flags]]
name = "-r"
description = "Reverse sort order"

[[command.flags]]
name = "-n"
description = "Sort by numeric value"

[[command.flags]]
name = "-k"
arg = "KEY"
description = "Sort by key field"

[[command.flags]]
name = "-t"
arg = "SEP"
description = "Set field separator"

[[command.flags]]
name = "-u"
description = "Output only unique lines"

[[command.flags]]
name = "-h"
description = "Sort human-readable numbers"

[[command.flags]]
name = "-f"
description = "Fold lower to upper case"

[[command.flags]]
name = "-o"
arg = "FILE"
description = "Write result to file"

[[command.flags]]
name = "-s"
description = "Stabilize sort by disabling last-resort comparison"
