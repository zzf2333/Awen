[command]
name = "tsc"
description = "TypeScript compiler"

[[command.flags]]
name = "--project"
short = "-p"
arg = "PATH"
description = "Compile from tsconfig.json"

[[command.flags]]
name = "--watch"
short = "-w"
description = "Watch for file changes"

[[command.flags]]
name = "--noEmit"
description = "Do not emit outputs"

[[command.flags]]
name = "--strict"
description = "Enable all strict checks"

[[command.flags]]
name = "--outDir"
arg = "DIR"
description = "Output directory"

[[command.flags]]
name = "--outFile"
arg = "FILE"
description = "Output single file"

[[command.flags]]
name = "--declaration"
short = "-d"
description = "Generate .d.ts files"

[[command.flags]]
name = "--target"
short = "-t"
arg = "VERSION"
description = "Set ECMAScript target (ES5, ES6, ES2020, ESNext)"

[[command.flags]]
name = "--module"
short = "-m"
arg = "TYPE"
description = "Module system (commonjs, esnext, nodenext)"

[[command.flags]]
name = "--init"
description = "Create tsconfig.json"

[[command.flags]]
name = "--build"
short = "-b"
description = "Build project references"

[[command.flags]]
name = "--sourceMap"
description = "Generate source maps"

[[command.flags]]
name = "--jsx"
arg = "TYPE"
description = "JSX handling (react, react-jsx, preserve)"

[[command.flags]]
name = "--esModuleInterop"
description = "Emit helpers for CJS/ESM interop"

[[command.flags]]
name = "--resolveJsonModule"
description = "Allow importing .json files"

[[command.flags]]
name = "--skipLibCheck"
description = "Skip type checking of .d.ts files"

[[command.flags]]
name = "--incremental"
description = "Enable incremental compilation"

[[command.flags]]
name = "--listFiles"
description = "Print compiled file names"

[[command.flags]]
name = "--pretty"
description = "Pretty-print errors"
