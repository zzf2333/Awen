[command]
name = "gzip"
description = "Compress or decompress files"

[[command.flags]]
name = "--decompress"
short = "-d"
description = "Decompress"

[[command.flags]]
name = "--keep"
short = "-k"
description = "Keep input files"

[[command.flags]]
name = "--recursive"
short = "-r"
description = "Recurse into directories"

[[command.flags]]
name = "--verbose"
short = "-v"
description = "Verbose output"

[[command.flags]]
name = "--stdout"
short = "-c"
description = "Write to stdout"

[[command.flags]]
name = "--list"
short = "-l"
description = "List compression info"

[[command.flags]]
name = "--force"
short = "-f"
description = "Force overwrite"

[[command.flags]]
name = "--best"
short = "-9"
description = "Best compression"

[[command.flags]]
name = "--fast"
short = "-1"
description = "Fastest compression"

[[command.flags]]
name = "--test"
short = "-t"
description = "Test integrity"
