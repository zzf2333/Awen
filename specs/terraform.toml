[command]
name = "terraform"
description = "Infrastructure as code tool"

[[command.subcommands]]
name = "init"
description = "Initialize working directory"
[[command.subcommands.flags]]
name = "--backend-config"
arg = "KEY=VALUE"
description = "Backend configuration"
[[command.subcommands.flags]]
name = "--upgrade"
description = "Upgrade providers"
[[command.subcommands.flags]]
name = "--reconfigure"
description = "Reconfigure backend"

[[command.subcommands]]
name = "plan"
description = "Preview changes"
[[command.subcommands.flags]]
name = "-out"
arg = "FILE"
description = "Save plan to file"
[[command.subcommands.flags]]
name = "-var"
arg = "KEY=VALUE"
description = "Set a variable"
[[command.subcommands.flags]]
name = "-var-file"
arg = "FILE"
description = "Variable definitions file"
[[command.subcommands.flags]]
name = "--destroy"
description = "Plan destruction"
[[command.subcommands.flags]]
name = "-target"
arg = "RESOURCE"
description = "Target specific resource"

[[command.subcommands]]
name = "apply"
description = "Apply changes"
[[command.subcommands.flags]]
name = "--auto-approve"
description = "Skip approval prompt"
[[command.subcommands.flags]]
name = "-var"
arg = "KEY=VALUE"
description = "Set a variable"
[[command.subcommands.flags]]
name = "-var-file"
arg = "FILE"
description = "Variable definitions file"
[[command.subcommands.flags]]
name = "-target"
arg = "RESOURCE"
description = "Target specific resource"

[[command.subcommands]]
name = "destroy"
description = "Destroy infrastructure"
[[command.subcommands.flags]]
name = "--auto-approve"
description = "Skip approval prompt"
[[command.subcommands.flags]]
name = "-target"
arg = "RESOURCE"
description = "Target specific resource"

[[command.subcommands]]
name = "fmt"
description = "Format configuration files"
[[command.subcommands.flags]]
name = "--check"
description = "Check if formatted"
[[command.subcommands.flags]]
name = "--diff"
description = "Show formatting diff"
[[command.subcommands.flags]]
name = "--recursive"
description = "Process subdirectories"

[[command.subcommands]]
name = "validate"
description = "Validate configuration"

[[command.subcommands]]
name = "state"
description = "Manage state"
[[command.subcommands.subcommands]]
name = "list"
description = "List resources in state"
[[command.subcommands.subcommands]]
name = "show"
description = "Show a resource"
[[command.subcommands.subcommands]]
name = "mv"
description = "Move a resource"
[[command.subcommands.subcommands]]
name = "rm"
description = "Remove from state"
[[command.subcommands.subcommands]]
name = "pull"
description = "Pull remote state"
[[command.subcommands.subcommands]]
name = "push"
description = "Push state to remote"

[[command.subcommands]]
name = "workspace"
description = "Manage workspaces"
[[command.subcommands.subcommands]]
name = "new"
description = "Create a workspace"
[[command.subcommands.subcommands]]
name = "select"
description = "Switch workspace"
[[command.subcommands.subcommands]]
name = "list"
description = "List workspaces"
[[command.subcommands.subcommands]]
name = "delete"
description = "Delete a workspace"

[[command.subcommands]]
name = "output"
description = "Show output values"
[[command.subcommands.flags]]
name = "--json"
description = "Output as JSON"
[[command.subcommands.flags]]
name = "--raw"
description = "Raw output value"

[[command.subcommands]]
name = "import"
description = "Import existing resource"
[[command.subcommands.flags]]
name = "-var"
arg = "KEY=VALUE"
description = "Set a variable"
