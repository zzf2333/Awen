[command]
name = "yarn"
description = "Yarn package manager"

[[command.flags]]
name = "--cwd"
arg = "DIR"
description = "Set the working directory"
[[command.flags]]
name = "--json"
description = "Format output as JSON"

[[command.subcommands]]
name = "add"
description = "Add a dependency"
[[command.subcommands.flags]]
name = "--dev"
short = "-D"
description = "Save as dev dependency"
[[command.subcommands.flags]]
name = "--exact"
short = "-E"
description = "Save exact version"
[[command.subcommands.flags]]
name = "--peer"
short = "-P"
description = "Save as peer dependency"
[[command.subcommands.flags]]
name = "--optional"
short = "-O"
description = "Save as optional dependency"

[[command.subcommands]]
name = "remove"
description = "Remove a dependency"

[[command.subcommands]]
name = "install"
description = "Install all dependencies"

[[command.subcommands]]
name = "run"
description = "Run a script defined in package.json"

[[command.subcommands]]
name = "init"
description = "Create a new package"

[[command.subcommands]]
name = "up"
description = "Upgrade a dependency"
[[command.subcommands.flags]]
name = "--interactive"
short = "-i"
description = "Choose which packages to update"
[[command.subcommands.flags]]
name = "--exact"
short = "-E"
description = "Pin to exact version"

[[command.subcommands]]
name = "info"
description = "Show information about a package"

[[command.subcommands]]
name = "list"
description = "List installed packages"

[[command.subcommands]]
name = "audit"
description = "Check for known vulnerabilities"

[[command.subcommands]]
name = "build"
description = "Run the build script"

[[command.subcommands]]
name = "test"
description = "Run the test script"

[[command.subcommands]]
name = "workspace"
description = "Manage workspaces"
[[command.subcommands.subcommands]]
name = "list"
description = "List all workspaces"
[[command.subcommands.subcommands]]
name = "foreach"
description = "Run a command in each workspace"

[[command.subcommands]]
name = "dlx"
description = "Run a package without installing"

[[command.subcommands]]
name = "set"
description = "Set a configuration value"
[[command.subcommands.subcommands]]
name = "version"
description = "Set the Yarn version"

[[command.subcommands]]
name = "plugin"
description = "Manage plugins"
[[command.subcommands.subcommands]]
name = "import"
description = "Import a plugin"
[[command.subcommands.subcommands]]
name = "remove"
description = "Remove a plugin"
[[command.subcommands.subcommands]]
name = "list"
description = "List installed plugins"
[[command.subcommands.subcommands]]
name = "runtime"
description = "Show plugin runtime information"

[[command.subcommands]]
name = "pack"
description = "Create a tarball from the package"

[[command.subcommands]]
name = "publish"
description = "Publish the package to the registry"

[[command.subcommands]]
name = "why"
description = "Show why a package is installed"

[[command.subcommands]]
name = "config"
description = "Manage configuration"
[[command.subcommands.subcommands]]
name = "set"
description = "Set a configuration value"
[[command.subcommands.subcommands]]
name = "get"
description = "Get a configuration value"
[[command.subcommands.subcommands]]
name = "unset"
description = "Remove a configuration value"

[[command.subcommands]]
name = "link"
description = "Symlink a local package"

[[command.subcommands]]
name = "unlink"
description = "Remove a symlinked package"

[[command.subcommands]]
name = "cache"
description = "Manage the package cache"
[[command.subcommands.subcommands]]
name = "clean"
description = "Remove all cached packages"
[[command.subcommands.subcommands]]
name = "dir"
description = "Print the cache directory path"
