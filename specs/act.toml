[command]
name = "act"
description = "Run GitHub Actions locally"

[[command.flags]]
name = "--list"
short = "-l"
description = "List available workflows"

[[command.flags]]
name = "--job"
short = "-j"
arg = "JOB"
description = "Run specific job"

[[command.flags]]
name = "--workflows"
short = "-W"
arg = "PATH"
description = "Workflow file or directory"

[[command.flags]]
name = "--secret"
short = "-s"
arg = "KEY=VALUE"
description = "Set a secret"

[[command.flags]]
name = "--secret-file"
arg = "FILE"
description = "Read secrets from file"

[[command.flags]]
name = "--env"
arg = "KEY=VALUE"
description = "Set environment variable"

[[command.flags]]
name = "--env-file"
arg = "FILE"
description = "Read env vars from file"

[[command.flags]]
name = "--platform"
short = "-P"
arg = "PLATFORM=IMAGE"
description = "Custom platform image"

[[command.flags]]
name = "--dryrun"
short = "-n"
description = "Dry run without executing"

[[command.flags]]
name = "--verbose"
short = "-v"
description = "Verbose output"

[[command.flags]]
name = "--container-architecture"
arg = "ARCH"
description = "Container architecture"

[[command.flags]]
name = "--input"
arg = "KEY=VALUE"
description = "Set workflow input"

[[command.flags]]
name = "--artifact-server-path"
arg = "PATH"
description = "Artifact server path"
