[command]
name = "delta"
description = "Syntax-highlighting pager for diffs"

[[command.flags]]
name = "--side-by-side"
short = "-s"
description = "Side-by-side view"

[[command.flags]]
name = "--diff-so-fancy"
description = "Emulate diff-so-fancy style"

[[command.flags]]
name = "--navigate"
short = "-n"
description = "Enable file navigation"

[[command.flags]]
name = "--line-numbers"
description = "Show line numbers"

[[command.flags]]
name = "--dark"
description = "Use dark theme"

[[command.flags]]
name = "--light"
description = "Use light theme"

[[command.flags]]
name = "--syntax-theme"
arg = "THEME"
description = "Set syntax theme"

[[command.flags]]
name = "--paging"
arg = "WHEN"
description = "When to use pager"

[[command.flags]]
name = "--width"
short = "-w"
arg = "N"
description = "Display width"

[[command.flags]]
name = "--word-diff-regex"
arg = "REGEX"
description = "Regex for word-level diff"

[[command.flags]]
name = "--list-syntax-themes"
description = "List available syntax themes"
