[command]
name = "ss"
description = "Socket statistics"

[[command.flags]]
name = "-t"
description = "TCP sockets"

[[command.flags]]
name = "-u"
description = "UDP sockets"

[[command.flags]]
name = "-l"
description = "Listening sockets"

[[command.flags]]
name = "-n"
description = "Numeric output"

[[command.flags]]
name = "-p"
description = "Show process using socket"

[[command.flags]]
name = "-a"
description = "All sockets"

[[command.flags]]
name = "-4"
description = "IPv4 only"

[[command.flags]]
name = "-6"
description = "IPv6 only"

[[command.flags]]
name = "-s"
description = "Summary statistics"

[[command.flags]]
name = "-e"
description = "Extended info"
