[command]
name = "just"
description = "Command runner for project-specific tasks"

[[command.flags]]
name = "--list"
short = "-l"
description = "List available recipes"
[[command.flags]]
name = "--summary"
description = "List recipe names one per line"
[[command.flags]]
name = "--evaluate"
description = "Evaluate and print all variables"
[[command.flags]]
name = "--dump"
description = "Dump the justfile AST"
[[command.flags]]
name = "--fmt"
description = "Format the justfile"
[[command.flags]]
name = "--check"
description = "Check formatting without modifying"
[[command.flags]]
name = "--choose"
description = "Interactively choose a recipe to run"
[[command.flags]]
name = "--justfile"
short = "-f"
arg = "FILE"
description = "Path to justfile"
[[command.flags]]
name = "--working-directory"
short = "-d"
arg = "DIR"
description = "Set the working directory"
[[command.flags]]
name = "--set"
arg = "VARIABLE"
description = "Override a variable value"
[[command.flags]]
name = "--dry-run"
short = "-n"
description = "Print commands without running"
[[command.flags]]
name = "--verbose"
short = "-v"
description = "Verbose output"
[[command.flags]]
name = "--quiet"
short = "-q"
description = "Quiet output"
[[command.flags]]
name = "--yes"
description = "Auto-confirm all prompts"
[[command.flags]]
name = "--shell"
arg = "SHELL"
description = "Shell to use for running recipes"
[[command.flags]]
name = "--completions"
arg = "SHELL"
description = "Generate shell completions"
[[command.flags]]
name = "--unstable"
description = "Enable unstable features"
[[command.flags]]
name = "--color"
arg = "WHEN"
description = "Color output (auto, always, never)"
[[command.flags]]
name = "--dotenv-filename"
arg = "FILE"
description = "Dotenv filename to load"
[[command.flags]]
name = "--dotenv-path"
arg = "PATH"
description = "Path to dotenv file"
[[command.flags]]
name = "--timestamp-format"
arg = "FORMAT"
description = "Timestamp format string"
