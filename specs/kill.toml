[command]
name = "kill"
description = "Send signal to process"

[[command.flags]]
name = "-9"
description = "SIGKILL, force kill"

[[command.flags]]
name = "-15"
description = "SIGTERM, graceful stop"

[[command.flags]]
name = "-l"
description = "List available signals"

[[command.flags]]
name = "-s"
arg = "SIGNAL"
description = "Specify signal to send"

[[command.flags]]
name = "-HUP"
description = "SIGHUP, reload config"
