[command]
name = "dust"
description = "Intuitive disk usage tool"

[[command.flags]]
name = "--depth"
short = "-d"
arg = "N"
description = "Maximum depth to show"

[[command.flags]]
name = "--number-of-lines"
short = "-n"
arg = "N"
description = "Number of lines to show"

[[command.flags]]
name = "--reverse"
short = "-r"
description = "Reverse sort order"

[[command.flags]]
name = "--no-percent-bars"
short = "-b"
description = "Hide percentage bars"

[[command.flags]]
name = "--ignore-directory"
short = "-X"
arg = "DIR"
description = "Exclude directory"

[[command.flags]]
name = "--only-dir"
short = "-D"
description = "Only show directories"

[[command.flags]]
name = "--only-file"
short = "-F"
description = "Only show files"

[[command.flags]]
name = "--apparent-size"
short = "-s"
description = "Use apparent size"

[[command.flags]]
name = "--min-size"
short = "-z"
arg = "SIZE"
description = "Minimum size to show"
