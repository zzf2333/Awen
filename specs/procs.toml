[command]
name = "procs"
description = "Modern replacement for ps"

[[command.flags]]
name = "--sortd"
arg = "COLUMN"
description = "Sort descending by column"

[[command.flags]]
name = "--sorta"
arg = "COLUMN"
description = "Sort ascending by column"

[[command.flags]]
name = "--tree"
description = "Show process tree"

[[command.flags]]
name = "--watch"
short = "-w"
arg = "SECONDS"
description = "Watch mode with interval"

[[command.flags]]
name = "--or"
description = "OR logic for filters"

[[command.flags]]
name = "--and"
description = "AND logic for filters"

[[command.flags]]
name = "--pager"
arg = "COMMAND"
description = "Use specified pager"

[[command.flags]]
name = "--color"
arg = "WHEN"
description = "Color output (auto, always, never)"
