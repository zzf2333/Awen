[command]
name = "npx"
description = "Execute npm package binaries"

[[command.flags]]
name = "--yes"
short = "-y"
description = "Skip confirmation prompt"

[[command.flags]]
name = "--no"
description = "Cancel if package not installed"

[[command.flags]]
name = "--package"
short = "-p"
arg = "PKG"
description = "Package to install"

[[command.flags]]
name = "--call"
short = "-c"
arg = "CMD"
description = "Run command string"

[[command.flags]]
name = "--ignore-existing"
description = "Ignore existing local packages"
