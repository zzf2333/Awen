[command]
name = "df"
description = "Report filesystem disk space"

[[command.flags]]
name = "-h"
description = "Human-readable sizes"

[[command.flags]]
name = "-T"
description = "Show filesystem type"

[[command.flags]]
name = "-i"
description = "Show inode information"

[[command.flags]]
name = "-a"
description = "Include pseudo filesystems"

[[command.flags]]
name = "-t"
arg = "TYPE"
description = "Filter by filesystem type"

[[command.flags]]
name = "--total"
description = "Show grand total"
