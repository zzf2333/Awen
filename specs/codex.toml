[command]
name = "codex"
description = "OpenAI Codex CLI"

[[command.flags]]
name = "--model"
short = "-m"
arg = "MODEL"
description = "Select model"

[[command.flags]]
name = "--provider"
arg = "PROVIDER"
description = "Model provider"

[[command.flags]]
name = "--approval-mode"
arg = "MODE"
description = "Approval mode (suggest, auto-edit)"

[[command.flags]]
name = "--quiet"
short = "-q"
description = "Quiet output"

[[command.flags]]
name = "--config"
arg = "FILE"
description = "Config file path"

[[command.flags]]
name = "--version"
description = "Show version"

[[command.flags]]
name = "--help"
short = "-h"
description = "Show help"
