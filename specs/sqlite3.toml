[command]
name = "sqlite3"
description = "SQLite command-line interface"

[[command.flags]]
name = "-header"
description = "Show column headers"

[[command.flags]]
name = "-noheader"
description = "Hide column headers"

[[command.flags]]
name = "-column"
description = "Column-aligned output"

[[command.flags]]
name = "-csv"
description = "CSV output mode"

[[command.flags]]
name = "-json"
description = "JSON output mode"

[[command.flags]]
name = "-line"
description = "One value per line"

[[command.flags]]
name = "-separator"
arg = "SEP"
description = "Field separator"

[[command.flags]]
name = "-cmd"
arg = "COMMAND"
description = "Run command before input"

[[command.flags]]
name = "-readonly"
description = "Open database read-only"

[[command.flags]]
name = "-batch"
description = "Force batch I/O"

[[command.flags]]
name = "-init"
arg = "FILE"
description = "Read and execute from file"
