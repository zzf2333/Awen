[command]
name = "free"
description = "Display memory usage"
os = "linux"

[[command.flags]]
name = "--human"
short = "-h"
description = "Human-readable sizes"

[[command.flags]]
name = "-m"
description = "Display in megabytes"

[[command.flags]]
name = "-g"
description = "Display in gigabytes"

[[command.flags]]
name = "--total"
short = "-t"
description = "Show total"

[[command.flags]]
name = "--wide"
short = "-w"
description = "Wide output"

[[command.flags]]
name = "--seconds"
short = "-s"
arg = "N"
description = "Repeat every N seconds"
