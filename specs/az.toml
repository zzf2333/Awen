[command]
name = "az"
description = "Azure CLI"

[[command.flags]]
name = "--output"
short = "-o"
arg = "FORMAT"
description = "Output format (json, table, tsv, yaml, jsonc, none)"
[[command.flags]]
name = "--subscription"
arg = "SUB"
description = "Subscription name or ID"
[[command.flags]]
name = "--resource-group"
short = "-g"
arg = "GROUP"
description = "Resource group"
[[command.flags]]
name = "--query"
arg = "EXPR"
description = "JMESPath query"
[[command.flags]]
name = "--verbose"
description = "Verbose output"
[[command.flags]]
name = "--debug"
description = "Debug output"
[[command.flags]]
name = "--only-show-errors"
description = "Only show errors"

[[command.subcommands]]
name = "login"
description = "Log in to Azure"
[[command.subcommands.flags]]
name = "--use-device-code"
description = "Use device code flow"
[[command.subcommands.flags]]
name = "--service-principal"
description = "Log in as service principal"
[[command.subcommands.flags]]
name = "--tenant"
short = "-t"
arg = "TENANT"
description = "Tenant ID"
[[command.subcommands.flags]]
name = "--username"
short = "-u"
arg = "USER"
description = "Username"
[[command.subcommands.flags]]
name = "--password"
short = "-p"
arg = "PASS"
description = "Password"

[[command.subcommands]]
name = "account"
description = "Manage subscriptions"
[[command.subcommands.subcommands]]
name = "list"
description = "List subscriptions"
[[command.subcommands.subcommands]]
name = "show"
description = "Show current subscription"
