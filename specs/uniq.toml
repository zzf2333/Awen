[command]
name = "uniq"
description = "Filter adjacent repeated lines"

[[command.flags]]
name = "-c"
description = "Prefix lines with occurrence count"

[[command.flags]]
name = "-d"
description = "Print only duplicate lines"

[[command.flags]]
name = "-u"
description = "Print only unique lines"

[[command.flags]]
name = "-i"
description = "Ignore case when comparing"

[[command.flags]]
name = "-f"
arg = "NUM"
description = "Skip NUM fields before comparing"

[[command.flags]]
name = "-s"
arg = "NUM"
description = "Skip NUM chars before comparing"
