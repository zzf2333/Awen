[command]
name = "brew"
description = "macOS package manager"

[[command.subcommands]]
name = "install"
description = "Install formula or cask"
[[command.subcommands.flags]]
name = "--cask"
description = "Install as cask"
[[command.subcommands.flags]]
name = "--force"
description = "Force install"

[[command.subcommands]]
name = "uninstall"
description = "Uninstall formula or cask"
[[command.subcommands.flags]]
name = "--force"
description = "Force uninstall"
[[command.subcommands.flags]]
name = "--zap"
description = "Remove all files"

[[command.subcommands]]
name = "update"
description = "Update Homebrew"

[[command.subcommands]]
name = "upgrade"
description = "Upgrade packages"
[[command.subcommands.flags]]
name = "--greedy"
description = "Upgrade casks with auto-updates"

[[command.subcommands]]
name = "search"
description = "Search for formulae"

[[command.subcommands]]
name = "info"
description = "Show formula info"

[[command.subcommands]]
name = "list"
description = "List installed formulae"
[[command.subcommands.flags]]
name = "--cask"
description = "List casks only"

[[command.subcommands]]
name = "services"
description = "Manage background services"
[[command.subcommands.subcommands]]
name = "start"
description = "Start service"
[[command.subcommands.subcommands]]
name = "stop"
description = "Stop service"
[[command.subcommands.subcommands]]
name = "restart"
description = "Restart service"
[[command.subcommands.subcommands]]
name = "list"
description = "List services"

[[command.subcommands]]
name = "doctor"
description = "Check system for issues"

[[command.subcommands]]
name = "cleanup"
description = "Remove old versions"
[[command.subcommands.flags]]
name = "--prune"
arg = "DAYS"
description = "Remove cache older than days"

[[command.subcommands]]
name = "tap"
description = "Add a third-party repository"

[[command.subcommands]]
name = "untap"
description = "Remove a tap"

[[command.subcommands]]
name = "outdated"
description = "Show outdated formulae"

[[command.subcommands]]
name = "pin"
description = "Pin formula to current version"

[[command.subcommands]]
name = "unpin"
description = "Unpin formula"

[[command.subcommands]]
name = "deps"
description = "Show dependencies"
[[command.subcommands.flags]]
name = "--tree"
description = "Show as dependency tree"
[[command.subcommands.flags]]
name = "--installed"
description = "Only installed formulae"

[[command.subcommands]]
name = "autoremove"
description = "Remove unused dependencies"

[[command.subcommands]]
name = "reinstall"
description = "Reinstall formula or cask"
