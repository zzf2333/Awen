[command]
name = "conda"
description = "Package and environment manager"

[[command.subcommands]]
name = "create"
description = "Create a new environment"
[[command.subcommands.flags]]
name = "--name"
short = "-n"
arg = "NAME"
description = "Environment name"
[[command.subcommands.flags]]
name = "--prefix"
short = "-p"
arg = "PATH"
description = "Environment path"
[[command.subcommands.flags]]
name = "--channel"
short = "-c"
arg = "CHANNEL"
description = "Additional channel"
[[command.subcommands.flags]]
name = "--yes"
short = "-y"
description = "Skip confirmation"

[[command.subcommands]]
name = "activate"
description = "Activate an environment"

[[command.subcommands]]
name = "deactivate"
description = "Deactivate current environment"

[[command.subcommands]]
name = "install"
description = "Install packages"
[[command.subcommands.flags]]
name = "--name"
short = "-n"
arg = "NAME"
description = "Environment name"
[[command.subcommands.flags]]
name = "--channel"
short = "-c"
arg = "CHANNEL"
description = "Additional channel"
[[command.subcommands.flags]]
name = "--yes"
short = "-y"
description = "Skip confirmation"

[[command.subcommands]]
name = "remove"
description = "Remove packages or environment"
[[command.subcommands.flags]]
name = "--name"
short = "-n"
arg = "NAME"
description = "Environment name"
[[command.subcommands.flags]]
name = "--all"
description = "Remove entire environment"

[[command.subcommands]]
name = "list"
description = "List installed packages"
[[command.subcommands.flags]]
name = "--name"
short = "-n"
arg = "NAME"
description = "Environment name"

[[command.subcommands]]
name = "update"
description = "Update packages"
[[command.subcommands.flags]]
name = "--all"
description = "Update all packages"

[[command.subcommands]]
name = "env"
description = "Manage environments"
[[command.subcommands.subcommands]]
name = "list"
description = "List environments"
[[command.subcommands.subcommands]]
name = "create"
description = "Create from environment file"
[[command.subcommands.subcommands]]
name = "remove"
description = "Remove an environment"
[[command.subcommands.subcommands]]
name = "export"
description = "Export environment to YAML"

[[command.subcommands]]
name = "search"
description = "Search for packages"
[[command.subcommands.flags]]
name = "--channel"
short = "-c"
arg = "CHANNEL"
description = "Search in channel"

[[command.subcommands]]
name = "info"
description = "Show conda information"

[[command.subcommands]]
name = "clean"
description = "Remove unused packages and caches"
[[command.subcommands.flags]]
name = "--all"
short = "-a"
description = "Remove all"
