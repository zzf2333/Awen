[command]
name = "ruff"
description = "Fast Python linter and formatter"

[[command.flags]]
name = "--config"
arg = "FILE"
description = "Path to configuration file"
[[command.flags]]
name = "--quiet"
short = "-q"
description = "Suppress output"
[[command.flags]]
name = "--verbose"
short = "-v"
description = "Verbose output"
[[command.flags]]
name = "--output-format"
arg = "FORMAT"
description = "Output format (text, json, github, gitlab)"
[[command.flags]]
name = "--preview"
description = "Enable preview mode rules"

[[command.subcommands]]
name = "check"
description = "Run linting checks"
[[command.subcommands.flags]]
name = "--fix"
description = "Apply safe fixes automatically"
[[command.subcommands.flags]]
name = "--unsafe-fixes"
description = "Apply unsafe fixes"
[[command.subcommands.flags]]
name = "--no-fix"
description = "Disable auto-fixing"
[[command.subcommands.flags]]
name = "--select"
arg = "RULES"
description = "Enable specific rules"
[[command.subcommands.flags]]
name = "--ignore"
arg = "RULES"
description = "Disable specific rules"
[[command.subcommands.flags]]
name = "--fixable"
arg = "RULES"
description = "Rules eligible for fixing"
[[command.subcommands.flags]]
name = "--extend-select"
arg = "RULES"
description = "Enable additional rules"
[[command.subcommands.flags]]
name = "--per-file-ignores"
arg = "PATTERN"
description = "Per-file rule ignores"
[[command.subcommands.flags]]
name = "--diff"
description = "Show fix diff without applying"
[[command.subcommands.flags]]
name = "--show-fixes"
description = "Show applied fixes"
[[command.subcommands.flags]]
name = "--watch"
description = "Watch for file changes and re-lint"

[[command.subcommands]]
name = "format"
description = "Format source files"
[[command.subcommands.flags]]
name = "--check"
description = "Check formatting without modifying"
[[command.subcommands.flags]]
name = "--diff"
description = "Show formatting diff"
[[command.subcommands.flags]]
name = "--target-version"
arg = "VERSION"
description = "Target Python version"

[[command.subcommands]]
name = "rule"
description = "Show information about a specific rule"

[[command.subcommands]]
name = "linter"
description = "List available linters and their rules"
[[command.subcommands.flags]]
name = "--output-format"
arg = "FORMAT"
description = "Output format (text, json)"

[[command.subcommands]]
name = "clean"
description = "Remove cache files"

[[command.subcommands]]
name = "config"
description = "Show resolved configuration"

[[command.subcommands]]
name = "version"
description = "Show the ruff version"

[[command.subcommands]]
name = "server"
description = "Run the language server"
