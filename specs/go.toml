[command]
name = "go"
description = "Go language tool"

[[command.subcommands]]
name = "build"
description = "Compile packages"
[[command.subcommands.flags]]
name = "-o"
arg = "OUTPUT"
description = "Output file"
[[command.subcommands.flags]]
name = "-v"
description = "Verbose output"
[[command.subcommands.flags]]
name = "-race"
description = "Enable race detector"
[[command.subcommands.flags]]
name = "-ldflags"
arg = "FLAGS"
description = "Linker flags"
[[command.subcommands.flags]]
name = "-tags"
arg = "TAGS"
description = "Build tags"

[[command.subcommands]]
name = "run"
description = "Compile and run"
[[command.subcommands.flags]]
name = "-v"
description = "Verbose output"
[[command.subcommands.flags]]
name = "-race"
description = "Enable race detector"

[[command.subcommands]]
name = "test"
description = "Run tests"
[[command.subcommands.flags]]
name = "-v"
description = "Verbose output"
[[command.subcommands.flags]]
name = "-run"
arg = "PATTERN"
description = "Run matching tests"
[[command.subcommands.flags]]
name = "-bench"
arg = "PATTERN"
description = "Run matching benchmarks"
[[command.subcommands.flags]]
name = "-cover"
description = "Enable coverage"
[[command.subcommands.flags]]
name = "-count"
arg = "NUM"
description = "Run tests N times"
[[command.subcommands.flags]]
name = "-race"
description = "Enable race detector"
[[command.subcommands.flags]]
name = "-short"
description = "Shorten long tests"
[[command.subcommands.flags]]
name = "-timeout"
arg = "DURATION"
description = "Test timeout"

[[command.subcommands]]
name = "get"
description = "Download modules"
[[command.subcommands.flags]]
name = "-u"
description = "Update modules"
[[command.subcommands.flags]]
name = "-v"
description = "Verbose output"
[[command.subcommands.flags]]
name = "-d"
description = "Download only"
[[command.subcommands.flags]]
name = "-t"
description = "Include test deps"

[[command.subcommands]]
name = "mod"
description = "Module maintenance"
[[command.subcommands.subcommands]]
name = "init"
description = "Initialize new module"
[[command.subcommands.subcommands]]
name = "tidy"
description = "Tidy module dependencies"
[[command.subcommands.subcommands]]
name = "vendor"
description = "Vendor dependencies"
[[command.subcommands.subcommands]]
name = "download"
description = "Download modules"
[[command.subcommands.subcommands]]
name = "graph"
description = "Print dependency graph"
[[command.subcommands.subcommands]]
name = "edit"
description = "Edit go.mod"

[[command.subcommands]]
name = "fmt"
description = "Format Go source code"

[[command.subcommands]]
name = "vet"
description = "Report likely mistakes"

[[command.subcommands]]
name = "generate"
description = "Run go generate"
[[command.subcommands.flags]]
name = "-v"
description = "Verbose output"
[[command.subcommands.flags]]
name = "-run"
arg = "PATTERN"
description = "Run matching directives"

[[command.subcommands]]
name = "install"
description = "Compile and install"
[[command.subcommands.flags]]
name = "-v"
description = "Verbose output"

[[command.subcommands]]
name = "clean"
description = "Remove build artifacts"
[[command.subcommands.flags]]
name = "-cache"
description = "Clean build cache"
[[command.subcommands.flags]]
name = "-testcache"
description = "Clean test cache"
[[command.subcommands.flags]]
name = "-modcache"
description = "Clean module cache"
