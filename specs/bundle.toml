[command]
name = "bundle"
description = "Ruby dependency manager (Bundler)"

[[command.subcommands]]
name = "install"
description = "Install gems from Gemfile"
[[command.subcommands.flags]]
name = "--path"
arg = "PATH"
description = "Install gems to PATH"
[[command.subcommands.flags]]
name = "--without"
arg = "GROUPS"
description = "Exclude groups"
[[command.subcommands.flags]]
name = "--jobs"
short = "-j"
arg = "N"
description = "Parallel workers"

[[command.subcommands]]
name = "exec"
description = "Run command in bundle context"

[[command.subcommands]]
name = "update"
description = "Update gems"
[[command.subcommands.flags]]
name = "--conservative"
description = "Prefer minimal version changes"

[[command.subcommands]]
name = "add"
description = "Add gem to Gemfile"
[[command.subcommands.flags]]
name = "--group"
short = "-g"
arg = "GROUP"
description = "Add to group"

[[command.subcommands]]
name = "init"
description = "Generate Gemfile"

[[command.subcommands]]
name = "lock"
description = "Lock dependencies"

[[command.subcommands]]
name = "outdated"
description = "Show outdated gems"

[[command.subcommands]]
name = "clean"
description = "Remove unused gems"

[[command.subcommands]]
name = "config"
description = "Manage bundler config"
