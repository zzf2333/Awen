[command]
name = "cp"
description = "Copy files and directories"

[[command.flags]]
name = "-r"
description = "Copy directories recursively"

[[command.flags]]
name = "-i"
description = "Prompt before overwrite"

[[command.flags]]
name = "-v"
description = "Explain what is being done"

[[command.flags]]
name = "-p"
description = "Preserve file attributes"

[[command.flags]]
name = "-a"
description = "Archive mode, preserve all"

[[command.flags]]
name = "-n"
description = "Do not overwrite existing"

[[command.flags]]
name = "--update"
short = "-u"
description = "Copy only when source is newer"
os = "linux"

[[command.flags]]
name = "-l"
description = "Hard link instead of copy"
