[command]
name = "dig"
description = "DNS lookup utility"

[[command.flags]]
name = "-t"
arg = "TYPE"
description = "Query type"

[[command.flags]]
name = "-x"
arg = "ADDR"
description = "Reverse lookup"

[[command.flags]]
name = "+short"
description = "Brief answer"

[[command.flags]]
name = "+trace"
description = "Trace delegation path"

[[command.flags]]
name = "+noall"
description = "Clear all display flags"

[[command.flags]]
name = "+answer"
description = "Show answer section"

[[command.flags]]
name = "-p"
arg = "PORT"
description = "Port number"

[[command.flags]]
name = "@"
arg = "SERVER"
description = "DNS server to query"
