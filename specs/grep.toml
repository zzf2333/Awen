[command]
name = "grep"
description = "Search text patterns in files"

[[command.flags]]
name = "--recursive"
short = "-r"
description = "Search directories recursively"

[[command.flags]]
name = "-R"
description = "Recursive, follow symlinks"

[[command.flags]]
name = "--ignore-case"
short = "-i"
description = "Case-insensitive matching"

[[command.flags]]
name = "--line-number"
short = "-n"
description = "Print line numbers"

[[command.flags]]
name = "--files-with-matches"
short = "-l"
description = "Print only filenames"

[[command.flags]]
name = "--count"
short = "-c"
description = "Print only match count"

[[command.flags]]
name = "--invert-match"
short = "-v"
description = "Select non-matching lines"

[[command.flags]]
name = "--extended-regexp"
short = "-E"
description = "Use extended regex"

[[command.flags]]
name = "--perl-regexp"
short = "-P"
description = "Use Perl-compatible regex"

[[command.flags]]
name = "--word-regexp"
short = "-w"
description = "Match whole words only"

[[command.flags]]
name = "--after-context"
short = "-A"
arg = "NUM"
description = "Print NUM lines after match"

[[command.flags]]
name = "--before-context"
short = "-B"
arg = "NUM"
description = "Print NUM lines before match"

[[command.flags]]
name = "--context"
short = "-C"
arg = "NUM"
description = "Print NUM context lines"

[[command.flags]]
name = "--include"
arg = "GLOB"
description = "Search only matching files"

[[command.flags]]
name = "--exclude"
arg = "GLOB"
description = "Skip matching files"

[[command.flags]]
name = "--only-matching"
short = "-o"
description = "Print only matched parts"

[[command.flags]]
name = "-h"
description = "Suppress filename prefix"

[[command.flags]]
name = "--quiet"
short = "-q"
description = "Silent mode, exit on match"
