[command]
name = "bun"
description = "Fast JavaScript runtime and toolkit"

[[command.flags]]
name = "--bun"
description = "Force bun runtime instead of node"
[[command.flags]]
name = "--cwd"
arg = "DIR"
description = "Set the working directory"
[[command.flags]]
name = "--config"
arg = "FILE"
description = "Path to config file"

[[command.subcommands]]
name = "run"
description = "Run a file or script"

[[command.subcommands]]
name = "install"
description = "Install all dependencies"
[[command.subcommands.flags]]
name = "--frozen-lockfile"
description = "Fail if lockfile is outdated"
[[command.subcommands.flags]]
name = "--production"
description = "Skip dev dependencies"
[[command.subcommands.flags]]
name = "--no-save"
description = "Do not update package.json or lockfile"
[[command.subcommands.flags]]
name = "--dry-run"
description = "Show what would be installed"

[[command.subcommands]]
name = "add"
description = "Add a dependency"
[[command.subcommands.flags]]
name = "--dev"
short = "-d"
description = "Save as dev dependency"
[[command.subcommands.flags]]
name = "--global"
short = "-g"
description = "Install globally"
[[command.subcommands.flags]]
name = "--exact"
description = "Save exact version"
[[command.subcommands.flags]]
name = "--optional"
description = "Save as optional dependency"

[[command.subcommands]]
name = "remove"
description = "Remove a dependency"
[[command.subcommands.flags]]
name = "--global"
short = "-g"
description = "Remove globally installed package"

[[command.subcommands]]
name = "update"
description = "Update dependencies"

[[command.subcommands]]
name = "create"
description = "Scaffold a new project from a template"

[[command.subcommands]]
name = "init"
description = "Initialize a new project"

[[command.subcommands]]
name = "build"
description = "Bundle TypeScript and JavaScript"
[[command.subcommands.flags]]
name = "--outdir"
arg = "DIR"
description = "Output directory"
[[command.subcommands.flags]]
name = "--target"
arg = "TARGET"
description = "Build target (browser, bun, node)"
[[command.subcommands.flags]]
name = "--format"
arg = "FORMAT"
description = "Output format (esm, cjs, iife)"
[[command.subcommands.flags]]
name = "--minify"
description = "Minify output"
[[command.subcommands.flags]]
name = "--sourcemap"
arg = "TYPE"
description = "Sourcemap type (none, inline, external)"
[[command.subcommands.flags]]
name = "--entry-naming"
arg = "PATTERN"
description = "Entry point naming pattern"

[[command.subcommands]]
name = "test"
description = "Run tests"
[[command.subcommands.flags]]
name = "--timeout"
arg = "MS"
description = "Test timeout in milliseconds"
[[command.subcommands.flags]]
name = "--bail"
description = "Stop on first failure"
[[command.subcommands.flags]]
name = "--coverage"
description = "Enable code coverage"
[[command.subcommands.flags]]
name = "--rerun-each"
arg = "NUM"
description = "Re-run each test N times"

[[command.subcommands]]
name = "x"
description = "Execute a package binary (like npx)"

[[command.subcommands]]
name = "link"
description = "Symlink a local package"

[[command.subcommands]]
name = "unlink"
description = "Remove a symlinked package"

[[command.subcommands]]
name = "pm"
description = "Package manager utilities"
[[command.subcommands.subcommands]]
name = "cache"
description = "Print or manage the cache directory"
[[command.subcommands.subcommands]]
name = "ls"
description = "List installed packages"
[[command.subcommands.subcommands]]
name = "hash"
description = "Print the hash of the lockfile"
[[command.subcommands.subcommands]]
name = "hash-string"
description = "Print the hash of a string"
[[command.subcommands.subcommands]]
name = "hash-print"
description = "Print the hash stored in the lockfile"
[[command.subcommands.subcommands]]
name = "migrate"
description = "Migrate from another package manager"
[[command.subcommands.subcommands]]
name = "trust"
description = "Trust a dependency lifecycle script"
[[command.subcommands.subcommands]]
name = "untrust"
description = "Untrust a dependency lifecycle script"
[[command.subcommands.subcommands]]
name = "default-trusted"
description = "Print the default trusted dependencies"

[[command.subcommands]]
name = "repl"
description = "Start an interactive REPL"

[[command.subcommands]]
name = "upgrade"
description = "Upgrade bun to the latest version"

[[command.subcommands]]
name = "completions"
description = "Generate shell completions"
