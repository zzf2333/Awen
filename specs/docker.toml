[command]
name = "docker"
description = "Container management tool"

[[command.subcommands]]
name = "run"
description = "Run a container"
[[command.subcommands.flags]]
name = "--publish"
short = "-p"
arg = "HOST:CONTAINER"
description = "Map port"
[[command.subcommands.flags]]
name = "--volume"
short = "-v"
arg = "HOST:CONTAINER"
description = "Mount volume"
[[command.subcommands.flags]]
name = "--env"
short = "-e"
arg = "KEY=VALUE"
description = "Set environment variable"
[[command.subcommands.flags]]
name = "--detach"
short = "-d"
description = "Run in background"
[[command.subcommands.flags]]
name = "--interactive"
short = "-i"
description = "Keep STDIN open"
[[command.subcommands.flags]]
name = "--tty"
short = "-t"
description = "Allocate pseudo-TTY"
[[command.subcommands.flags]]
name = "--name"
arg = "NAME"
description = "Container name"
[[command.subcommands.flags]]
name = "--rm"
description = "Remove on exit"
[[command.subcommands.flags]]
name = "--network"
arg = "NETWORK"
description = "Connect to network"
[[command.subcommands.flags]]
name = "--restart"
arg = "POLICY"
description = "Restart policy"

[[command.subcommands]]
name = "build"
description = "Build an image"
[[command.subcommands.flags]]
name = "--tag"
short = "-t"
arg = "NAME:TAG"
description = "Image tag"
[[command.subcommands.flags]]
name = "--file"
short = "-f"
arg = "DOCKERFILE"
description = "Dockerfile path"
[[command.subcommands.flags]]
name = "--no-cache"
description = "Build without cache"
[[command.subcommands.flags]]
name = "--build-arg"
arg = "KEY=VALUE"
description = "Build argument"

[[command.subcommands]]
name = "ps"
description = "List containers"
[[command.subcommands.flags]]
name = "--all"
short = "-a"
description = "Show all containers"
[[command.subcommands.flags]]
name = "--quiet"
short = "-q"
description = "Only show IDs"

[[command.subcommands]]
name = "images"
description = "List images"
[[command.subcommands.flags]]
name = "--all"
short = "-a"
description = "Show all images"

[[command.subcommands]]
name = "exec"
description = "Execute command in container"
[[command.subcommands.flags]]
name = "--interactive"
short = "-i"
description = "Keep STDIN open"
[[command.subcommands.flags]]
name = "--tty"
short = "-t"
description = "Allocate pseudo-TTY"

[[command.subcommands]]
name = "stop"
description = "Stop container"

[[command.subcommands]]
name = "rm"
description = "Remove container"
[[command.subcommands.flags]]
name = "--force"
short = "-f"
description = "Force remove"

[[command.subcommands]]
name = "rmi"
description = "Remove image"
[[command.subcommands.flags]]
name = "--force"
short = "-f"
description = "Force remove"

[[command.subcommands]]
name = "logs"
description = "Show container logs"
[[command.subcommands.flags]]
name = "--follow"
short = "-f"
description = "Follow log output"
[[command.subcommands.flags]]
name = "--tail"
arg = "N"
description = "Number of lines"

[[command.subcommands]]
name = "compose"
description = "Docker Compose"
[[command.subcommands.subcommands]]
name = "up"
description = "Create and start services"
[[command.subcommands.subcommands]]
name = "down"
description = "Stop and remove services"
[[command.subcommands.subcommands]]
name = "build"
description = "Build services"
[[command.subcommands.subcommands]]
name = "logs"
description = "View service logs"
[[command.subcommands.subcommands]]
name = "ps"
description = "List services"
[[command.subcommands.flags]]
name = "--detach"
short = "-d"
description = "Run in background"
[[command.subcommands.flags]]
name = "--file"
short = "-f"
arg = "FILE"
description = "Compose file"

[[command.subcommands]]
name = "pull"
description = "Pull image"

[[command.subcommands]]
name = "push"
description = "Push image"

[[command.subcommands]]
name = "network"
description = "Manage networks"
[[command.subcommands.subcommands]]
name = "create"
description = "Create network"
[[command.subcommands.subcommands]]
name = "ls"
description = "List networks"
[[command.subcommands.subcommands]]
name = "rm"
description = "Remove network"

[[command.subcommands]]
name = "volume"
description = "Manage volumes"
[[command.subcommands.subcommands]]
name = "create"
description = "Create volume"
[[command.subcommands.subcommands]]
name = "ls"
description = "List volumes"
[[command.subcommands.subcommands]]
name = "rm"
description = "Remove volume"

[[command.subcommands]]
name = "inspect"
description = "Return low-level information"
[[command.subcommands.flags]]
name = "--format"
short = "-f"
arg = "FORMAT"
description = "Format output using Go template"

[[command.subcommands]]
name = "tag"
description = "Tag an image"

[[command.subcommands]]
name = "save"
description = "Save image to tar archive"
[[command.subcommands.flags]]
name = "--output"
short = "-o"
arg = "FILE"
description = "Write to file"

[[command.subcommands]]
name = "load"
description = "Load image from tar archive"
[[command.subcommands.flags]]
name = "--input"
short = "-i"
arg = "FILE"
description = "Read from file"

[[command.subcommands]]
name = "stats"
description = "Display container resource usage"
[[command.subcommands.flags]]
name = "--no-stream"
description = "Disable streaming stats"
[[command.subcommands.flags]]
name = "--format"
arg = "FORMAT"
description = "Format output"

[[command.subcommands]]
name = "login"
description = "Log in to a registry"
[[command.subcommands.flags]]
name = "--username"
short = "-u"
arg = "USER"
description = "Username"
[[command.subcommands.flags]]
name = "--password-stdin"
description = "Read password from stdin"

[[command.subcommands]]
name = "logout"
description = "Log out from a registry"

[[command.subcommands]]
name = "cp"
description = "Copy files between container and host"

[[command.subcommands]]
name = "system"
description = "Manage Docker"
[[command.subcommands.subcommands]]
name = "prune"
description = "Remove unused data"
[[command.subcommands.subcommands.flags]]
name = "--all"
short = "-a"
description = "Remove all unused data"
[[command.subcommands.subcommands.flags]]
name = "--force"
short = "-f"
description = "Skip confirmation"
[[command.subcommands.subcommands]]
name = "df"
description = "Show disk usage"
[[command.subcommands.subcommands]]
name = "info"
description = "Display system-wide information"

[[command.subcommands]]
name = "buildx"
description = "Extended build capabilities"
[[command.subcommands.subcommands]]
name = "build"
description = "Build with BuildKit"
[[command.subcommands.subcommands.flags]]
name = "--platform"
arg = "PLATFORM"
description = "Set target platform"
[[command.subcommands.subcommands.flags]]
name = "--push"
description = "Push after build"
[[command.subcommands.subcommands.flags]]
name = "--load"
description = "Load into docker images"
[[command.subcommands.subcommands.flags]]
name = "--tag"
short = "-t"
arg = "NAME:TAG"
description = "Image tag"

[[command.subcommands]]
name = "attach"
description = "Attach to a running container"

[[command.subcommands]]
name = "search"
description = "Search Docker Hub"
[[command.subcommands.flags]]
name = "--limit"
arg = "N"
description = "Max number of results"

[[command.subcommands]]
name = "commit"
description = "Create image from container"
[[command.subcommands.flags]]
name = "--author"
short = "-a"
arg = "AUTHOR"
description = "Author"
[[command.subcommands.flags]]
name = "--message"
short = "-m"
arg = "MSG"
description = "Commit message"
