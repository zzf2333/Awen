[command]
name = "git-lfs"
description = "Git Large File Storage"

[[command.subcommands]]
name = "install"
description = "Initialize Git LFS"
[[command.subcommands.flags]]
name = "--local"
description = "Set local config only"

[[command.subcommands]]
name = "track"
description = "Track file patterns"

[[command.subcommands]]
name = "untrack"
description = "Untrack file patterns"

[[command.subcommands]]
name = "pull"
description = "Download LFS files"
[[command.subcommands.flags]]
name = "--include"
short = "-I"
arg = "PATTERN"
description = "Include patterns"
[[command.subcommands.flags]]
name = "--exclude"
short = "-X"
arg = "PATTERN"
description = "Exclude patterns"

[[command.subcommands]]
name = "push"
description = "Upload LFS files"
[[command.subcommands.flags]]
name = "--all"
description = "Push all objects"

[[command.subcommands]]
name = "ls-files"
description = "List tracked files"
[[command.subcommands.flags]]
name = "--all"
short = "-a"
description = "Show all files"

[[command.subcommands]]
name = "migrate"
description = "Migrate repo to or from LFS"
[[command.subcommands.subcommands]]
name = "import"
description = "Convert files to LFS pointers"
[[command.subcommands.subcommands.flags]]
name = "--include"
arg = "PATTERN"
description = "File patterns to include"
[[command.subcommands.subcommands.flags]]
name = "--everything"
description = "Import all branches"
[[command.subcommands.subcommands]]
name = "export"
description = "Convert LFS pointers back to files"
[[command.subcommands.subcommands]]
name = "info"
description = "Show migration info"

[[command.subcommands]]
name = "status"
description = "Show LFS transfer status"

[[command.subcommands]]
name = "fetch"
description = "Download LFS objects"
[[command.subcommands.flags]]
name = "--all"
description = "Fetch all objects"

[[command.subcommands]]
name = "prune"
description = "Delete old LFS objects"
