[command]
name = "tar"
description = "Archive utility"

[[command.flags]]
name = "-x"
description = "Extract archive"

[[command.flags]]
name = "-c"
description = "Create archive"

[[command.flags]]
name = "-z"
description = "Filter through gzip"

[[command.flags]]
name = "-j"
description = "Filter through bzip2"

[[command.flags]]
name = "-v"
description = "Verbose output"

[[command.flags]]
name = "-f"
arg = "FILE"
description = "Archive filename"

[[command.flags]]
name = "-t"
description = "List archive contents"

[[command.flags]]
name = "-C"
arg = "DIR"
description = "Change to directory"

[[command.flags]]
name = "--strip-components"
arg = "NUM"
description = "Strip leading path components"

[[command.flags]]
name = "-J"
description = "Filter through xz"

[[command.flags]]
name = "--exclude"
arg = "PATTERN"
description = "Exclude matching files"

[[command.flags]]
name = "-r"
description = "Append to archive"
