[command]
name = "mypy"
description = "Python static type checker"

[[command.flags]]
name = "--strict"
description = "Enable all strict checks"

[[command.flags]]
name = "--ignore-missing-imports"
description = "Suppress missing import errors"

[[command.flags]]
name = "--config-file"
arg = "FILE"
description = "Configuration file"

[[command.flags]]
name = "--python-version"
arg = "VERSION"
description = "Python version to check against"

[[command.flags]]
name = "--disallow-untyped-defs"
description = "Disallow untyped function definitions"

[[command.flags]]
name = "--show-error-codes"
description = "Show error codes in output"

[[command.flags]]
name = "--no-error-summary"
description = "Disable error summary"

[[command.flags]]
name = "--check-untyped-defs"
description = "Type-check untyped functions"

[[command.flags]]
name = "--warn-return-any"
description = "Warn on returning Any"

[[command.flags]]
name = "--exclude"
arg = "PATTERN"
description = "Exclude paths matching pattern"

[[command.flags]]
name = "--install-types"
description = "Install missing type stubs"

[[command.flags]]
name = "--html-report"
arg = "DIR"
description = "Generate HTML coverage report"

[[command.flags]]
name = "--cache-dir"
arg = "DIR"
description = "Set cache directory"

[[command.flags]]
name = "--no-incremental"
description = "Disable incremental mode"
