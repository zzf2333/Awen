[command]
name = "find"
description = "Search for files in directories"

[[command.flags]]
name = "-name"
arg = "PATTERN"
description = "Match filename pattern"

[[command.flags]]
name = "-iname"
arg = "PATTERN"
description = "Case-insensitive name match"

[[command.flags]]
name = "-type"
arg = "TYPE"
description = "File type (f/d/l)"

[[command.flags]]
name = "-size"
arg = "SIZE"
description = "Match file size"

[[command.flags]]
name = "-mtime"
arg = "DAYS"
description = "Modified time in days"

[[command.flags]]
name = "-exec"
arg = "CMD"
description = "Execute command on matches"

[[command.flags]]
name = "-delete"
description = "Delete matching files"

[[command.flags]]
name = "-maxdepth"
arg = "NUM"
description = "Max directory depth"

[[command.flags]]
name = "-mindepth"
arg = "NUM"
description = "Min directory depth"

[[command.flags]]
name = "-path"
arg = "PATTERN"
description = "Match full path pattern"

[[command.flags]]
name = "-not"
description = "Negate next expression"

[[command.flags]]
name = "-empty"
description = "Match empty files or dirs"

[[command.flags]]
name = "-newer"
arg = "FILE"
description = "Newer than reference file"

[[command.flags]]
name = "-perm"
arg = "MODE"
description = "Match file permissions"

[[command.flags]]
name = "-user"
arg = "NAME"
description = "Match file owner"
