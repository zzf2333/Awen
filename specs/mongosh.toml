[command]
name = "mongosh"
description = "MongoDB Shell"

[[command.flags]]
name = "--host"
arg = "HOST"
description = "Server hostname"

[[command.flags]]
name = "--port"
arg = "PORT"
description = "Server port"

[[command.flags]]
name = "--username"
arg = "USER"
description = "Authentication user"

[[command.flags]]
name = "--password"
arg = "PASS"
description = "Authentication password"

[[command.flags]]
name = "--eval"
arg = "SCRIPT"
description = "Evaluate JavaScript"

[[command.flags]]
name = "--file"
arg = "FILE"
description = "Run JavaScript file"

[[command.flags]]
name = "--authenticationDatabase"
arg = "DB"
description = "Auth database"

[[command.flags]]
name = "--quiet"
description = "Suppress non-error output"

[[command.flags]]
name = "--norc"
description = "Skip .mongoshrc.js"

[[command.flags]]
name = "--tls"
description = "Enable TLS connection"
