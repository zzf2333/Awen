[command]
name = "nmap"
description = "Network exploration and scanner"

[[command.flags]]
name = "-sS"
description = "TCP SYN scan"

[[command.flags]]
name = "-sT"
description = "TCP connect scan"

[[command.flags]]
name = "-sU"
description = "UDP scan"

[[command.flags]]
name = "-p"
arg = "PORTS"
description = "Port range"

[[command.flags]]
name = "-A"
description = "Aggressive scan"

[[command.flags]]
name = "-O"
description = "OS detection"

[[command.flags]]
name = "-sV"
description = "Service version detection"

[[command.flags]]
name = "-Pn"
description = "Skip host discovery"

[[command.flags]]
name = "-v"
description = "Verbose output"

[[command.flags]]
name = "-oN"
arg = "FILE"
description = "Normal output to file"

[[command.flags]]
name = "-oX"
arg = "FILE"
description = "XML output to file"

[[command.flags]]
name = "--top-ports"
arg = "NUM"
description = "Scan top N ports"

[[command.flags]]
name = "-sn"
description = "Ping scan only"

[[command.flags]]
name = "-T"
arg = "LEVEL"
description = "Timing template 0-5"
