[command]
name = "java"
description = "Java application launcher"

[[command.flags]]
name = "-jar"
arg = "FILE"
description = "Execute JAR file"

[[command.flags]]
name = "-cp"
arg = "PATH"
description = "Classpath"

[[command.flags]]
name = "-D"
arg = "KEY=VALUE"
description = "Set system property"

[[command.flags]]
name = "-Xmx"
arg = "SIZE"
description = "Maximum heap size"

[[command.flags]]
name = "-Xms"
arg = "SIZE"
description = "Initial heap size"

[[command.flags]]
name = "-Xss"
arg = "SIZE"
description = "Thread stack size"

[[command.flags]]
name = "--version"
description = "Print version"

[[command.flags]]
name = "-ea"
description = "Enable assertions"

[[command.flags]]
name = "-server"
description = "Use server VM"

[[command.flags]]
name = "-verbose"
arg = "TYPE"
description = "Verbose output (class, gc, jni)"

[[command.flags]]
name = "--enable-preview"
description = "Enable preview features"
