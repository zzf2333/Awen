[command]
name = "black"
description = "Python code formatter"

[[command.flags]]
name = "--check"
description = "Check without modifying files"

[[command.flags]]
name = "--diff"
description = "Show diff of changes"

[[command.flags]]
name = "--line-length"
short = "-l"
arg = "N"
description = "Characters per line"

[[command.flags]]
name = "--target-version"
short = "-t"
arg = "VERSION"
description = "Python version target"

[[command.flags]]
name = "--quiet"
short = "-q"
description = "Minimal output"

[[command.flags]]
name = "--verbose"
short = "-v"
description = "Verbose output"

[[command.flags]]
name = "--include"
arg = "PATTERN"
description = "Files to include"

[[command.flags]]
name = "--exclude"
arg = "PATTERN"
description = "Files to exclude"

[[command.flags]]
name = "--fast"
description = "Skip AST safety check"

[[command.flags]]
name = "--preview"
description = "Enable preview style"

[[command.flags]]
name = "--config"
arg = "FILE"
description = "Configuration file"
