[command]
name = "composer"
description = "PHP dependency manager"

[[command.subcommands]]
name = "install"
description = "Install dependencies"
[[command.subcommands.flags]]
name = "--no-dev"
description = "Skip dev dependencies"
[[command.subcommands.flags]]
name = "--optimize-autoloader"
short = "-o"
description = "Optimize autoloader"

[[command.subcommands]]
name = "require"
description = "Add a dependency"
[[command.subcommands.flags]]
name = "--dev"
description = "Add as dev dependency"

[[command.subcommands]]
name = "update"
description = "Update dependencies"
[[command.subcommands.flags]]
name = "--with-dependencies"
short = "-w"
description = "Update with dependencies"

[[command.subcommands]]
name = "remove"
description = "Remove a dependency"

[[command.subcommands]]
name = "dump-autoload"
description = "Regenerate autoloader"
[[command.subcommands.flags]]
name = "--optimize"
short = "-o"
description = "Optimize autoloader"

[[command.subcommands]]
name = "create-project"
description = "Create project from template"

[[command.subcommands]]
name = "show"
description = "Show package details"
[[command.subcommands.flags]]
name = "--installed"
short = "-i"
description = "Show installed packages only"
[[command.subcommands.flags]]
name = "--tree"
short = "-t"
description = "Show as dependency tree"

[[command.subcommands]]
name = "run-script"
description = "Run a script"

[[command.subcommands]]
name = "outdated"
description = "Show outdated packages"
[[command.subcommands.flags]]
name = "--direct"
short = "-D"
description = "Show only direct dependencies"

[[command.subcommands]]
name = "validate"
description = "Validate composer.json"

[[command.subcommands]]
name = "init"
description = "Create composer.json interactively"

[[command.subcommands]]
name = "global"
description = "Run command globally"
