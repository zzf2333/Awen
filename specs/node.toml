[command]
name = "node"
description = "Node.js runtime"

[[command.flags]]
name = "--version"
short = "-v"
description = "Show version"

[[command.flags]]
name = "--eval"
short = "-e"
arg = "SCRIPT"
description = "Evaluate script"

[[command.flags]]
name = "--check"
short = "-c"
description = "Syntax check only"

[[command.flags]]
name = "--inspect"
arg = "HOST:PORT"
description = "Enable inspector"

[[command.flags]]
name = "--inspect-brk"
arg = "HOST:PORT"
description = "Inspect and break at start"

[[command.flags]]
name = "--watch"
description = "Watch mode"

[[command.flags]]
name = "--experimental-modules"
description = "Enable ESM support"

[[command.flags]]
name = "--max-old-space-size"
arg = "MB"
description = "Heap size limit"

[[command.flags]]
name = "--env-file"
arg = "FILE"
description = "Load env file"
