[command]
name = "uv"
description = "Fast Python package installer and resolver"

[[command.flags]]
name = "--quiet"
short = "-q"
description = "Suppress output"
[[command.flags]]
name = "--verbose"
short = "-v"
description = "Verbose output"
[[command.flags]]
name = "--color"
arg = "WHEN"
description = "Control color output (auto, always, never)"
[[command.flags]]
name = "--python"
arg = "VERSION"
description = "Python interpreter to use"
[[command.flags]]
name = "--project"
arg = "DIR"
description = "Path to the project directory"

[[command.subcommands]]
name = "pip"
description = "Pip-compatible package management"
[[command.subcommands.subcommands]]
name = "install"
description = "Install packages"
[[command.subcommands.subcommands.flags]]
name = "--requirement"
short = "-r"
arg = "FILE"
description = "Install from requirements file"
[[command.subcommands.subcommands.flags]]
name = "--editable"
short = "-e"
arg = "PATH"
description = "Install in editable mode"
[[command.subcommands.subcommands.flags]]
name = "--constraint"
short = "-c"
arg = "FILE"
description = "Constrain versions with file"
[[command.subcommands.subcommands.flags]]
name = "--no-deps"
description = "Skip installing dependencies"
[[command.subcommands.subcommands.flags]]
name = "--system"
description = "Install into the system Python"
[[command.subcommands.subcommands]]
name = "compile"
description = "Compile requirements files"
[[command.subcommands.subcommands]]
name = "sync"
description = "Sync environment with requirements"
[[command.subcommands.subcommands]]
name = "freeze"
description = "List installed packages"
[[command.subcommands.subcommands]]
name = "list"
description = "List installed packages with versions"
[[command.subcommands.subcommands]]
name = "show"
description = "Show package details"
[[command.subcommands.subcommands]]
name = "uninstall"
description = "Uninstall packages"
[[command.subcommands.subcommands]]
name = "check"
description = "Verify installed packages"

[[command.subcommands]]
name = "venv"
description = "Create a virtual environment"
[[command.subcommands.flags]]
name = "--python"
arg = "VERSION"
description = "Python version for the venv"
[[command.subcommands.flags]]
name = "--seed"
description = "Install seed packages (pip, setuptools)"

[[command.subcommands]]
name = "run"
description = "Run a command in the project environment"
[[command.subcommands.flags]]
name = "--with"
arg = "PKG"
description = "Include additional package"
[[command.subcommands.flags]]
name = "--python"
arg = "VERSION"
description = "Python version to use"
[[command.subcommands.flags]]
name = "--no-project"
description = "Run without project dependencies"

[[command.subcommands]]
name = "sync"
description = "Sync project environment with lockfile"

[[command.subcommands]]
name = "lock"
description = "Resolve and lock dependencies"
[[command.subcommands.flags]]
name = "--upgrade"
description = "Allow upgrading all packages"
[[command.subcommands.flags]]
name = "--check"
description = "Check lockfile is up to date"

[[command.subcommands]]
name = "add"
description = "Add a dependency to the project"
[[command.subcommands.flags]]
name = "--dev"
description = "Add as dev dependency"
[[command.subcommands.flags]]
name = "--group"
arg = "GROUP"
description = "Add to dependency group"
[[command.subcommands.flags]]
name = "--optional"
arg = "EXTRA"
description = "Add as optional dependency"
[[command.subcommands.flags]]
name = "--editable"
description = "Add in editable mode"

[[command.subcommands]]
name = "remove"
description = "Remove a dependency from the project"

[[command.subcommands]]
name = "tree"
description = "Show the dependency tree"

[[command.subcommands]]
name = "init"
description = "Initialize a new project"
[[command.subcommands.flags]]
name = "--lib"
description = "Create a library project"
[[command.subcommands.flags]]
name = "--app"
description = "Create an application project"
[[command.subcommands.flags]]
name = "--script"
description = "Create a single-file script"
[[command.subcommands.flags]]
name = "--package"
description = "Create a packaged application"
[[command.subcommands.flags]]
name = "--python"
arg = "VERSION"
description = "Python version for the project"

[[command.subcommands]]
name = "build"
description = "Build the project into packages"

[[command.subcommands]]
name = "publish"
description = "Publish the project to a registry"

[[command.subcommands]]
name = "python"
description = "Manage Python installations"
[[command.subcommands.subcommands]]
name = "install"
description = "Install a Python version"
[[command.subcommands.subcommands]]
name = "list"
description = "List available Python versions"
[[command.subcommands.subcommands]]
name = "find"
description = "Find an installed Python version"
[[command.subcommands.subcommands]]
name = "pin"
description = "Pin a Python version for the project"
[[command.subcommands.subcommands]]
name = "uninstall"
description = "Uninstall a Python version"

[[command.subcommands]]
name = "tool"
description = "Manage globally installed tools"
[[command.subcommands.subcommands]]
name = "install"
description = "Install a tool globally"
[[command.subcommands.subcommands]]
name = "run"
description = "Run a tool without installing"
[[command.subcommands.subcommands]]
name = "list"
description = "List installed tools"
[[command.subcommands.subcommands]]
name = "uninstall"
description = "Uninstall a tool"
[[command.subcommands.subcommands]]
name = "upgrade"
description = "Upgrade an installed tool"

[[command.subcommands]]
name = "cache"
description = "Manage the cache"
[[command.subcommands.subcommands]]
name = "clean"
description = "Remove all cached data"
[[command.subcommands.subcommands]]
name = "dir"
description = "Print the cache directory path"
[[command.subcommands.subcommands]]
name = "prune"
description = "Remove unused cached data"

[[command.subcommands]]
name = "self"
description = "Manage the uv installation"
[[command.subcommands.subcommands]]
name = "update"
description = "Update uv to the latest version"

[[command.subcommands]]
name = "version"
description = "Show the uv version"
