[command]
name = "python"
description = "Python interpreter"

[[command.flags]]
name = "-m"
arg = "MODULE"
description = "Run module as script"

[[command.flags]]
name = "-c"
arg = "CMD"
description = "Run command string"

[[command.flags]]
name = "-i"
description = "Interactive after script"

[[command.flags]]
name = "-u"
description = "Unbuffered output"

[[command.flags]]
name = "--version"
short = "-V"
description = "Show version"

[[command.flags]]
name = "-B"
description = "Don't write .pyc files"

[[command.flags]]
name = "-O"
description = "Optimize bytecode"

[[command.flags]]
name = "-W"
arg = "ACTION"
description = "Warning control"

[[command.flags]]
name = "--venv"
arg = "DIR"
description = "Create virtual environment"
