[command]
name = "mv"
description = "Move or rename files"

[[command.flags]]
name = "-i"
description = "Prompt before overwrite"

[[command.flags]]
name = "-f"
description = "Force overwrite without prompt"

[[command.flags]]
name = "-v"
description = "Explain what is being done"

[[command.flags]]
name = "-n"
description = "Do not overwrite existing"

[[command.flags]]
name = "--update"
short = "-u"
description = "Move only when source is newer"
os = "linux"
