[command]
name = "deno"
description = "Secure JavaScript and TypeScript runtime"

[[command.subcommands]]
name = "run"
description = "Run a program"
[[command.subcommands.flags]]
name = "--allow-net"
description = "Allow network access"
[[command.subcommands.flags]]
name = "--allow-read"
description = "Allow file read access"
[[command.subcommands.flags]]
name = "--allow-write"
description = "Allow file write access"
[[command.subcommands.flags]]
name = "--allow-env"
description = "Allow environment access"
[[command.subcommands.flags]]
name = "--allow-all"
short = "-A"
description = "Allow all permissions"
[[command.subcommands.flags]]
name = "--watch"
description = "Watch for changes and restart"

[[command.subcommands]]
name = "compile"
description = "Compile to standalone executable"
[[command.subcommands.flags]]
name = "--output"
short = "-o"
arg = "FILE"
description = "Output file"

[[command.subcommands]]
name = "fmt"
description = "Format source files"
[[command.subcommands.flags]]
name = "--check"
description = "Check formatting without changes"

[[command.subcommands]]
name = "lint"
description = "Lint source files"
[[command.subcommands.flags]]
name = "--fix"
description = "Auto-fix linting issues"

[[command.subcommands]]
name = "test"
description = "Run tests"
[[command.subcommands.flags]]
name = "--filter"
arg = "PATTERN"
description = "Run tests matching pattern"
[[command.subcommands.flags]]
name = "--coverage"
arg = "DIR"
description = "Collect coverage data"

[[command.subcommands]]
name = "task"
description = "Run a task from deno.json"

[[command.subcommands]]
name = "install"
description = "Install dependencies or script"
[[command.subcommands.flags]]
name = "--global"
short = "-g"
description = "Install globally"

[[command.subcommands]]
name = "check"
description = "Type-check modules"

[[command.subcommands]]
name = "bench"
description = "Run benchmarks"

[[command.subcommands]]
name = "init"
description = "Initialize a new project"

[[command.subcommands]]
name = "add"
description = "Add a dependency"

[[command.subcommands]]
name = "remove"
description = "Remove a dependency"
