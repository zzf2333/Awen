[command]
name = "wget"
description = "Non-interactive network downloader"

[[command.flags]]
name = "-O"
arg = "FILE"
description = "Output file"

[[command.flags]]
name = "-q"
description = "Quiet output"

[[command.flags]]
name = "-c"
description = "Continue partial download"

[[command.flags]]
name = "-r"
description = "Recursive download"

[[command.flags]]
name = "-P"
arg = "DIR"
description = "Directory prefix"

[[command.flags]]
name = "--limit-rate"
arg = "RATE"
description = "Download speed limit"

[[command.flags]]
name = "--no-check-certificate"
description = "Skip TLS verification"

[[command.flags]]
name = "-b"
description = "Run in background"

[[command.flags]]
name = "-i"
arg = "FILE"
description = "Read URLs from file"

[[command.flags]]
name = "--mirror"
description = "Mirror a website"

[[command.flags]]
name = "-np"
description = "No parent directory"

[[command.flags]]
name = "-k"
description = "Convert links for local"
