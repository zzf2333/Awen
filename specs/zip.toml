[command]
name = "zip"
description = "Package and compress files"

[[command.flags]]
name = "-r"
description = "Recurse into directories"

[[command.flags]]
name = "-e"
description = "Encrypt with password"

[[command.flags]]
name = "-x"
arg = "PATTERN"
description = "Exclude files matching pattern"

[[command.flags]]
name = "-9"
description = "Maximum compression"

[[command.flags]]
name = "-j"
description = "Junk directory names"

[[command.flags]]
name = "-u"
description = "Update existing entries"

[[command.flags]]
name = "-d"
description = "Delete entries from archive"

[[command.flags]]
name = "-q"
description = "Quiet mode"

[[command.flags]]
name = "-v"
description = "Verbose output"
