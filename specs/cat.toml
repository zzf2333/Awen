[command]
name = "cat"
description = "Concatenate and print files"

[[command.flags]]
name = "-n"
description = "Number all output lines"

[[command.flags]]
name = "-b"
description = "Number non-blank lines"

[[command.flags]]
name = "-s"
description = "Squeeze consecutive blank lines"

[[command.flags]]
name = "-A"
description = "Show all non-printing chars"

[[command.flags]]
name = "-E"
description = "Show $ at end of each line"
