[command]
name = "pip"
description = "Python package manager"

[[command.subcommands]]
name = "install"
description = "Install packages"
[[command.subcommands.flags]]
name = "--requirement"
short = "-r"
arg = "FILE"
description = "Install from file"
[[command.subcommands.flags]]
name = "--upgrade"
short = "-U"
description = "Upgrade packages"
[[command.subcommands.flags]]
name = "--user"
description = "Install to user site"
[[command.subcommands.flags]]
name = "--editable"
short = "-e"
arg = "PATH"
description = "Install in editable mode"
[[command.subcommands.flags]]
name = "--no-deps"
description = "Skip dependencies"
[[command.subcommands.flags]]
name = "--force-reinstall"
description = "Force reinstallation"
[[command.subcommands.flags]]
name = "--index-url"
short = "-i"
arg = "URL"
description = "Base URL of package index"

[[command.subcommands]]
name = "uninstall"
description = "Uninstall packages"
[[command.subcommands.flags]]
name = "--requirement"
short = "-r"
arg = "FILE"
description = "Uninstall from file"
[[command.subcommands.flags]]
name = "--yes"
short = "-y"
description = "Skip confirmation"

[[command.subcommands]]
name = "freeze"
description = "List installed packages"
[[command.subcommands.flags]]
name = "--local"
description = "Local packages only"
[[command.subcommands.flags]]
name = "--user"
description = "User packages only"

[[command.subcommands]]
name = "list"
description = "List installed packages"
[[command.subcommands.flags]]
name = "--outdated"
description = "Show outdated packages"
[[command.subcommands.flags]]
name = "--uptodate"
description = "Show up-to-date packages"
[[command.subcommands.flags]]
name = "--format"
arg = "FORMAT"
description = "Output format"

[[command.subcommands]]
name = "show"
description = "Show package information"
[[command.subcommands.flags]]
name = "--files"
description = "Show installed files"

[[command.subcommands]]
name = "search"
description = "Search PyPI"

[[command.subcommands]]
name = "download"
description = "Download packages"
[[command.subcommands.flags]]
name = "--dest"
short = "-d"
arg = "DIR"
description = "Download directory"
[[command.subcommands.flags]]
name = "--requirement"
short = "-r"
arg = "FILE"
description = "Download from file"

[[command.subcommands]]
name = "check"
description = "Verify installed packages"
