[command]
name = "cargo"
description = "Rust package manager"

[[command.subcommands]]
name = "build"
description = "Compile the project"
[[command.subcommands.flags]]
name = "--release"
description = "Build with optimizations"
[[command.subcommands.flags]]
name = "--target"
arg = "TARGET"
description = "Build for target"
[[command.subcommands.flags]]
name = "--features"
arg = "FEATURES"
description = "Enable features"
[[command.subcommands.flags]]
name = "--all-features"
description = "Enable all features"

[[command.subcommands]]
name = "run"
description = "Build and execute"
[[command.subcommands.flags]]
name = "--release"
description = "Run with optimizations"
[[command.subcommands.flags]]
name = "--bin"
arg = "NAME"
description = "Run specific binary"
[[command.subcommands.flags]]
name = "--example"
arg = "NAME"
description = "Run an example"

[[command.subcommands]]
name = "test"
description = "Run tests"
[[command.subcommands.flags]]
name = "--release"
description = "Test with optimizations"
[[command.subcommands.flags]]
name = "--lib"
description = "Test library only"
[[command.subcommands.flags]]
name = "--doc"
description = "Test documentation examples"
[[command.subcommands.flags]]
name = "--no-fail-fast"
description = "Run all tests regardless of failure"

[[command.subcommands]]
name = "check"
description = "Check for errors without building"

[[command.subcommands]]
name = "clippy"
description = "Run linter"
[[command.subcommands.flags]]
name = "--fix"
description = "Apply suggestions"
[[command.subcommands.flags]]
name = "--allow-dirty"
description = "Allow dirty working directory"

[[command.subcommands]]
name = "fmt"
description = "Format code"
[[command.subcommands.flags]]
name = "--check"
description = "Check formatting without changing"

[[command.subcommands]]
name = "add"
description = "Add a dependency"
[[command.subcommands.flags]]
name = "--dev"
short = "-D"
description = "Add as dev dependency"
[[command.subcommands.flags]]
name = "--features"
arg = "FEATURES"
description = "Enable features"

[[command.subcommands]]
name = "remove"
description = "Remove a dependency"

[[command.subcommands]]
name = "init"
description = "Create a new project in current directory"
[[command.subcommands.flags]]
name = "--lib"
description = "Create library project"
[[command.subcommands.flags]]
name = "--name"
arg = "NAME"
description = "Project name"

[[command.subcommands]]
name = "new"
description = "Create a new project"
[[command.subcommands.flags]]
name = "--lib"
description = "Create library project"

[[command.subcommands]]
name = "publish"
description = "Publish to crates.io"
[[command.subcommands.flags]]
name = "--dry-run"
description = "Perform checks without publishing"

[[command.subcommands]]
name = "doc"
description = "Build documentation"
[[command.subcommands.flags]]
name = "--open"
description = "Open in browser"
[[command.subcommands.flags]]
name = "--no-deps"
description = "Skip dependencies"

[[command.subcommands]]
name = "bench"
description = "Run benchmarks"

[[command.subcommands]]
name = "update"
description = "Update dependencies"

[[command.subcommands]]
name = "clean"
description = "Remove build artifacts"

[[command.subcommands]]
name = "tree"
description = "Display dependency tree"
[[command.subcommands.flags]]
name = "--invert"
short = "-i"
arg = "SPEC"
description = "Show what depends on package"

[[command.subcommands]]
name = "search"
description = "Search crates.io"

[[command.subcommands]]
name = "install"
description = "Install a Rust binary"
[[command.subcommands.flags]]
name = "--path"
arg = "PATH"
description = "Install from local path"
[[command.subcommands.flags]]
name = "--git"
arg = "URL"
description = "Install from git repo"
[[command.subcommands.flags]]
name = "--force"
short = "-f"
description = "Force overwrite"

[[command.subcommands]]
name = "uninstall"
description = "Remove an installed binary"

[[command.subcommands]]
name = "fix"
description = "Apply compiler suggestions"
[[command.subcommands.flags]]
name = "--edition"
description = "Fix edition-related lints"
[[command.subcommands.flags]]
name = "--allow-dirty"
description = "Allow dirty working directory"

[[command.subcommands]]
name = "vendor"
description = "Vendor all dependencies locally"
