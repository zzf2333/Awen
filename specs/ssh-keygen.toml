[command]
name = "ssh-keygen"
description = "Generate SSH key pairs"

[[command.flags]]
name = "-t"
arg = "TYPE"
description = "Key type (rsa, ed25519, ecdsa)"

[[command.flags]]
name = "-b"
arg = "BITS"
description = "Key size in bits"

[[command.flags]]
name = "-C"
arg = "COMMENT"
description = "Key comment"

[[command.flags]]
name = "-f"
arg = "FILE"
description = "Output key file"

[[command.flags]]
name = "-p"
description = "Change passphrase"

[[command.flags]]
name = "-l"
description = "Show fingerprint"

[[command.flags]]
name = "-R"
arg = "HOST"
description = "Remove host from known_hosts"

[[command.flags]]
name = "-N"
arg = "PASSPHRASE"
description = "New passphrase"

[[command.flags]]
name = "-E"
arg = "HASH"
description = "Hash algorithm (md5, sha256)"

[[command.flags]]
name = "-y"
description = "Read private key, print public key"
