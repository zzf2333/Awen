[command]
name = "dotnet"
description = ".NET CLI"

[[command.subcommands]]
name = "new"
description = "Create a new project"
[[command.subcommands.flags]]
name = "--name"
short = "-n"
arg = "NAME"
description = "Project name"
[[command.subcommands.flags]]
name = "--output"
short = "-o"
arg = "DIR"
description = "Output directory"
[[command.subcommands.flags]]
name = "--language"
arg = "LANG"
description = "Project language (C#, F#, VB)"
[[command.subcommands.flags]]
name = "--list"
description = "List available templates"

[[command.subcommands]]
name = "build"
description = "Build the project"
[[command.subcommands.flags]]
name = "--configuration"
short = "-c"
arg = "CONFIG"
description = "Build configuration (Debug, Release)"
[[command.subcommands.flags]]
name = "--output"
short = "-o"
arg = "DIR"
description = "Output directory"

[[command.subcommands]]
name = "run"
description = "Build and run the project"
[[command.subcommands.flags]]
name = "--project"
arg = "FILE"
description = "Project file"
[[command.subcommands.flags]]
name = "--configuration"
short = "-c"
arg = "CONFIG"
description = "Build configuration"

[[command.subcommands]]
name = "test"
description = "Run tests"
[[command.subcommands.flags]]
name = "--filter"
arg = "EXPR"
description = "Filter expression"
[[command.subcommands.flags]]
name = "--no-build"
description = "Skip build"
[[command.subcommands.flags]]
name = "--verbosity"
short = "-v"
arg = "LEVEL"
description = "Verbosity level"

[[command.subcommands]]
name = "publish"
description = "Publish the project"
[[command.subcommands.flags]]
name = "--configuration"
short = "-c"
arg = "CONFIG"
description = "Build configuration"
[[command.subcommands.flags]]
name = "--self-contained"
description = "Include runtime"
[[command.subcommands.flags]]
name = "--runtime"
short = "-r"
arg = "RID"
description = "Target runtime"

[[command.subcommands]]
name = "add"
description = "Add reference or package"
[[command.subcommands.subcommands]]
name = "package"
description = "Add NuGet package"
[[command.subcommands.subcommands]]
name = "reference"
description = "Add project reference"

[[command.subcommands]]
name = "restore"
description = "Restore dependencies"

[[command.subcommands]]
name = "clean"
description = "Clean build output"

[[command.subcommands]]
name = "watch"
description = "Run with file watching"

[[command.subcommands]]
name = "tool"
description = "Manage .NET tools"
[[command.subcommands.subcommands]]
name = "install"
description = "Install a tool"
[[command.subcommands.subcommands]]
name = "uninstall"
description = "Uninstall a tool"
[[command.subcommands.subcommands]]
name = "list"
description = "List installed tools"
