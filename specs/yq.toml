[command]
name = "yq"
description = "Command-line YAML/JSON/XML processor"

[[command.flags]]
name = "--raw-output"
short = "-r"
description = "Output raw strings"

[[command.flags]]
name = "--in-place"
short = "-i"
description = "Edit file in place"

[[command.flags]]
name = "--prettyPrint"
short = "-P"
description = "Pretty print output"

[[command.flags]]
name = "--output-format"
short = "-o"
arg = "FORMAT"
description = "Output format (yaml, json, xml, tsv, csv, props)"

[[command.flags]]
name = "--input-format"
short = "-p"
arg = "FORMAT"
description = "Input format"

[[command.flags]]
name = "--null-input"
short = "-n"
description = "No input"

[[command.flags]]
name = "--no-doc"
short = "-N"
description = "Remove document separators"

[[command.flags]]
name = "--colors"
short = "-C"
description = "Force color output"

[[command.flags]]
name = "--exit-status"
short = "-e"
description = "Exit with error on false/null"

[[command.subcommands]]
name = "eval"
description = "Evaluate expression"

[[command.subcommands]]
name = "eval-all"
description = "Evaluate expression over all documents"
